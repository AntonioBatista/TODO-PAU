<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v7.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#121212', darkCard: '#1e1e1e', darkBorder: '#333333' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        :root { --bg: #F8F9FA; --subject-color: #000000; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; transition: background 0.3s; overflow-x: hidden; }

        .glass-header { background: white; border-bottom: 1px solid #eee; padding: 0.5rem 1rem; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-50; }
        .dark .glass-header { background: #121212; border-color: #333; }

        .subject-nav { display: flex; gap: 6px; align-items: center; background: #f1f5f9; padding: 4px; border-radius: 14px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .dark .subject-nav { background: #1e1e1e; }
        .subject-nav::-webkit-scrollbar { display: none; }
        .subject-tab { flex-shrink: 0; padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; }
        .subject-tab.active-sub { background: white; color: var(--subject-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .dark .subject-tab.active-sub { background: #333; color: white; }

        #sidebar { width: 280px; position: fixed; left: 0; top: 70px; bottom: 0; background: white; border-right: 1px solid #eee; z-index: 45; transition: all 0.3s ease; }
        .dark #sidebar { background: #121212; border-color: #333; }
        #sidebar.collapsed { transform: translateX(-100%); width: 0; padding: 0; visibility: hidden; }

        @media (min-width: 1024px) {
            #sidebar { position: relative; top: 0; transform: none !important; }
            #sidebar.collapsed { width: 0; margin-left: -280px; visibility: hidden; }
        }

        #rightPanel { width: 320px; background: white; border-left: 1px solid #eee; padding: 1.5rem; overflow-y: auto; transition: all 0.3s ease; display: none; }
        .dark #rightPanel { background: #121212; border-color: #333; }
        #rightPanel.visible { display: flex; flex-direction: column; }

        .data-row { display: grid; grid-template-columns: 1fr; grid-template-areas: "header" "content" "tags" "solution" "footer"; gap: 0.75rem; background: white; border-radius: 20px; border: 1px solid #eee; padding: 1.25rem; }
        .dark .data-row { background: #1e1e1e; border-color: #333; }
        @media (min-width: 768px) { .data-row { grid-template-columns: 1fr 220px; grid-template-areas: "header tags" "content tags" "solution solution" "footer footer"; gap: 0 1.5rem; } }

        .card-header-area { grid-area: header; }
        .card-content-area { grid-area: content; align-self: start; }
        .card-tags-area { grid-area: tags; display: flex; flex-wrap: wrap; gap: 0.4rem; align-self: start; }
        @media (min-width: 768px) { .card-tags-area { flex-direction: column; align-items: flex-end; } }
        .solucion-panel { grid-area: solution; }
        .card-footer-area { grid-area: footer; }

        .btn-app { @apply px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all active:scale-95; border: 1px solid transparent; }
        .btn-sol-active { border-radius: 0.75rem !important; }
        
        .problem-image { width: 100%; border-radius: 12px; margin: 1rem 0; }
        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }

        #empty-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; pointer-events: none; width: 300px; transition: opacity 0.5s; }
    </style>
</head>

<body class="h-screen flex flex-col dark:bg-darkBg dark:text-gray-100">

<div id="menuOverlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/30 z-40 hidden lg:hidden backdrop-blur-sm"></div>

<header class="glass-header no-print">
    <div class="flex items-center gap-2">
        <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-black italic text-md hidden sm:block tracking-tighter">TodoPAU</span>
    </div>

    <nav class="subject-nav mx-2">
        <div onclick="switchSubject('QUIM')" id="btn-QUIM" class="subject-tab active-sub">Química</div>
        <div onclick="switchSubject('FIS')" id="btn-FIS" class="subject-tab">Física</div>
        <div onclick="switchSubject('MATII')" id="btn-MATII" class="subject-tab">Mat II</div>
        <div onclick="switchSubject('MACSII')" id="btn-MACSII" class="subject-tab">CCSS II</div>
        <div onclick="switchSubject('TINII')" id="btn-TINII" class="subject-tab">Tecno</div>
        <div onclick="switchSubject('DTECII')" id="btn-DTECII" class="subject-tab">Dibujo</div>
    </nav>

    <div class="flex items-center gap-1">
        <button onclick="toggleDarkMode()" class="p-2 rounded-xl text-lg">🌙</button>
        <button id="loginBtn" class="bg-black text-white dark:bg-white dark:text-black px-3 py-1.5 rounded-xl text-[10px] font-bold uppercase">Entrar</button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden relative">
    
    <aside id="sidebar" class="no-print p-6 flex flex-col gap-5 overflow-y-auto custom-scroll collapsed">
        <section>
            <label class="text-[10px] uppercase font-bold text-gray-400 mb-2 block tracking-widest">Buscador</label>
            <input id="search" type="text" placeholder="Concepto..." class="w-full bg-transparent border-b p-2 text-sm outline-none dark:border-zinc-700">
        </section>

        <details id="mobileGen" class="hidden bg-blue-50/50 dark:bg-blue-900/20 p-4 rounded-2xl border border-blue-100 dark:border-blue-800">
            <summary class="text-[10px] font-black text-blue-800 dark:text-blue-300 uppercase cursor-pointer">Generador de Examen</summary>
            <div class="pt-4 space-y-3">
                <input id="h-inst-mob" type="text" placeholder="Institución" class="w-full p-2 text-[10px] rounded border dark:bg-zinc-900 dark:border-zinc-700">
                <div class="grid grid-cols-2 gap-2">
                    <select id="autoYearFrom-mob" class="border rounded p-2 text-[10px] dark:bg-zinc-900 dark:border-zinc-700"></select>
                    <select id="autoYearTo-mob" class="border rounded p-2 text-[10px] dark:bg-zinc-900 dark:border-zinc-700"></select>
                </div>
                <button id="mobSorteoBtn" onclick="runSorteo('mob')" class="w-full py-2 bg-blue-600 text-white rounded-xl font-black text-[9px]" disabled>SORTEAR</button>
                <button onclick="printExam('mob')" class="w-full py-2 bg-black text-white dark:bg-white dark:text-black rounded-xl font-black text-[9px]" disabled>GENERAR PDF</button>
            </div>
        </details>

        <section class="space-y-3">
            <select id="topicSelect" onchange="updateDynamicTags(); render();" class="w-full border rounded-xl p-2 text-xs bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 outline-none"></select>
            <select id="yearSelect" onchange="handleYearChange();" class="w-full border rounded-xl p-2 text-xs bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 outline-none"></select>
            <select id="modelSelect" onchange="render();" class="w-full border rounded-xl p-2 text-xs bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 outline-none" disabled>
                <option value="all">Modelo: Todos</option>
            </select>
        </section>

        <div id="tagCloudSection" class="hidden">
            <label class="text-[10px] uppercase font-bold text-gray-400 mb-4 block border-t pt-4 dark:border-zinc-800 text-center">Etiquetas</label>
            <div id="tagCloud" class="flex flex-wrap gap-2 justify-center"></div>
        </div>

        <button onclick="resetFilters()" class="w-full py-2 text-red-500 text-[9px] font-black uppercase">Limpiar Filtros</button>

        <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden w-full py-3 mt-4 border-2 border-dashed border-red-200 text-red-500 rounded-2xl font-black text-[9px] uppercase hover:bg-red-50 transition">
            ⚙️ Panel Gestión
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative bg-[#fcfcfc] dark:bg-darkBg">
        <img id="empty-logo" src="https://img.icons8.com/fluency/240/test-tube.png">
        <div id="stats" class="mb-4 text-[9px] font-black text-gray-400 uppercase tracking-widest text-center italic">Busca o selecciona un bloque</div>
        <div id="questions" class="max-w-4xl mx-auto flex flex-col gap-4"></div>
        <div id="loader" class="hidden text-center py-10 opacity-30 italic">Cargando base de datos...</div>
    </main>

    <aside id="rightPanel" class="no-print">
        <h3 class="font-black text-sm tracking-widest uppercase mb-6 text-center">Configurador de Examen</h3>
        <div class="space-y-6 flex-1 overflow-y-auto pr-2 custom-scroll">
            <div class="bg-blue-50/50 dark:bg-blue-900/20 p-5 rounded-3xl border border-blue-100 dark:border-blue-800 space-y-4">
                <p class="text-[9px] font-black text-blue-800 dark:text-blue-300 uppercase italic">Sorteo Aleatorio</p>
                <div class="grid grid-cols-2 gap-2">
                    <select id="autoYearFrom" class="border rounded p-2 text-[10px] dark:bg-zinc-900 dark:border-zinc-700"></select>
                    <select id="autoYearTo" class="border rounded p-2 text-[10px] dark:bg-zinc-900 dark:border-zinc-700"></select>
                </div>
                <button onclick="runSorteo('pc')" class="w-full py-2.5 bg-blue-600 text-white rounded-xl font-black text-[9px]" disabled>SORTEAR</button>
            </div>
            <div class="space-y-3">
                <p class="text-[9px] font-black text-gray-400 uppercase">Cabecera PDF</p>
                <input id="h-inst" type="text" placeholder="Institución" class="w-full p-3 rounded-xl text-[10px] border dark:bg-zinc-900 dark:border-zinc-700">
                <input id="h-title" type="text" placeholder="Título Examen" class="w-full p-3 rounded-xl text-[10px] border dark:bg-zinc-900 dark:border-zinc-700">
            </div>
            <div class="bg-gray-100 dark:bg-zinc-800 p-4 rounded-2xl text-center">
                <p class="text-[9px] font-bold uppercase">Seleccionados: <span id="examCount" class="text-blue-600 text-lg">0</span></p>
            </div>
            <button onclick="printExam()" class="w-full py-4 bg-black text-white dark:bg-white dark:text-black rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-xl" disabled>GENERAR PDF</button>
        </div>
    </aside>
</div>

<div id="adminPanel" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white dark:bg-darkCard w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase italic">Gestión de Alumnos</h2>
            <button onclick="toggleAdminPanel()" class="text-gray-400">✕</button>
        </div>
        <div class="space-y-6">
            <input id="adminUserEmail" type="email" placeholder="Email del alumno" class="w-full p-3 rounded-xl border dark:bg-zinc-900 text-sm outline-none">
            <select id="adminUserPlan" class="w-full p-3 rounded-xl border dark:bg-zinc-900 text-xs">
                <option value="estudiante">Estudiante</option>
                <option value="pro">Pro</option>
                <option value="docente">Docente</option>
            </select>
            <button onclick="updateUserLevel()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg">Actualizar Permisos</button>
            <p id="adminStatus" class="text-[10px] text-center font-bold uppercase"></p>
        </div>
    </div>
</div>

<script>
// CONFIG ADMIN: Pon aquí tu correo para ver el botón de gestión
const MI_CORREO_ADMIN = "tuemail@gmail.com"; 

const firebaseConfig = {
    apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
    authDomain: "todopau-bat.firebaseapp.com",
    projectId: "todopau-bat",
    appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(async user => {
    const btn = document.getElementById("loginBtn");
    const adminBtn = document.getElementById("adminBtn");
    const rightPanel = document.getElementById("rightPanel");
    const mobileGen = document.getElementById("mobileGen");
    const mobSorteoBtn = document.getElementById("mobSorteoBtn");
    const pdfMobBtn = mobileGen.querySelector("button:nth-child(2)");

    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline mr-1"> Salir`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
        
        // Mostrar Admin si eres tú
        if(user.email === MI_CORREO_ADMIN) adminBtn.classList.remove('hidden');

        // Habilitar generador de exámenes
        mobSorteoBtn.disabled = false;
        pdfMobBtn.disabled = false;

        // Lógica de visualización del generador según plan
        const tokenResult = await user.getIdTokenResult();
        const plan = tokenResult.claims.plan || 'estudiante';
        if(plan === 'docente') {
            rightPanel.classList.add('visible');
            mobileGen.classList.remove('hidden');
        }
    } else {
        btn.textContent = "Entrar";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        adminBtn.classList.add('hidden');
        rightPanel.classList.remove('visible');
        mobileGen.classList.add('hidden');

        // Deshabilitar generador de exámenes
        mobSorteoBtn.disabled = true;
        pdfMobBtn.disabled = true;
    }
    render();
});

function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

const subjectConfig = {
    'QUIM': { folder: 'quimica', color: '#00c853', icon: 'test-tube' },
    'FIS': { folder: 'fisica', color: '#2979ff', icon: 'physics' },
    'MATII': { folder: 'matii', color: '#651fff', icon: 'math' },
    'MACSII': { folder: 'macsii', color: '#f50057', icon: 'line-chart' },
    'TINII': { folder: 'tinii', color: '#ff9100', icon: 'circuit' },
    'DTECII': { folder: 'dtecii', color: '#455a64', icon: 'drafting-compass' }
};

let currentSubject = "QUIM";
let allQuestions = [];
let selectedIds = new Set();
let activeTagFilter = "all";

function switchSubject(id) {
    currentSubject = id;
    document.documentElement.style.setProperty('--subject-color', subjectConfig[id].color);
    document.querySelectorAll('.subject-tab').forEach(b => b.classList.remove('active-sub'));
    document.getElementById(`btn-${id}`).classList.add('active-sub');
    document.getElementById('empty-logo').src = `https://img.icons8.com/fluency/240/${subjectConfig[id].icon}.png`;
    
    // Limpiamos la pantalla al cambiar materia
    document.getElementById('questions').innerHTML = "";
    document.getElementById('empty-logo').style.opacity = "0.05";
    
    loadData();
}

function cleanText(t) {
    if(!t) return "";
    let c = t.replace(/\\n/g, '\n');
    const map = {'3³':'ó','3a':'ía','3º':'ú','3i':'í','3e':'é','3n':'ón','3u':'ú','3A':'Á','3O':'Ó'};
    Object.keys(map).forEach(k => c = c.replace(new RegExp(k, 'g'), map[k]));
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    return c.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

async function loadData() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    try {
        const response = await fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/index`);
        const index = await response.json();
        const promises = index.topics.map(t => fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/file?name=${t.file}`).then(r => r.json()));
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        loader.classList.add('hidden');
        render();
    } catch (e) { loader.classList.add('hidden'); }
}

function render() {
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const term = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('questions');
    const emptyLogo = document.getElementById('empty-logo');

    // ESTADO LIMPIO: Si no hay filtros, no pintar nada y mostrar logo
    if (year === 'all' && topic === 'all' && term === "") {
        container.innerHTML = "";
        emptyLogo.style.opacity = "0.05";
        return;
    }

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year)
    );

    emptyLogo.style.opacity = "0";
    container.innerHTML = '';
    
    filtered.forEach(q => {
        const isSel = selectedIds.has(q.id);
        const card = document.createElement('div');
        card.className = `data-row ${isSel ? 'ring-2 ring-black dark:ring-white' : ''}`;
        card.innerHTML = `
            <div class="card-header-area"><h2 class="text-2xl font-black">${q.exam_year} <span class="text-[9px] text-gray-400 uppercase font-bold ml-2">${q.exam_model || ''}</span></h2></div>
            <div class="card-content-area prose prose-sm dark:prose-invert">
                ${marked.parse(cleanText(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="problem-image">` : ''}
            </div>
            <div class="card-tags-area">
                <span class="px-3 py-1 bg-blue-500 text-white rounded-lg text-[8px] font-black uppercase">${q.topic_name}</span>
                ${(q.detected_topics || []).map(t => `<span class="px-3 py-1 bg-emerald-500 text-white rounded-lg text-[8px] font-black uppercase">${t}</span>`).join('')}
            </div>
            <div class="card-footer-area flex gap-2 border-t pt-4 dark:border-zinc-800">
                <button onclick="toggleInExam('${q.id}')" class="btn-app ${isSel ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-zinc-800'}">${isSel ? '✕ Quitar' : '+ Añadir'}</button>
                <button onclick="document.getElementById('sol-${q.id}').classList.toggle('hidden')" class="btn-app ${q.solution ? subjectConfig[currentSubject].color : 'bg-gray-100 dark:bg-zinc-800'}">Solución</button>
            </div>
            <div id="sol-${q.id}" class="solucion-panel hidden mt-4 p-5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border-l-4 border-black dark:border-white">${marked.parse(cleanText(q.solution || ""))}</div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

function handleYearChange() {
    const year = document.getElementById('yearSelect').value;
    const mSel = document.getElementById('modelSelect');
    if (year === 'all') { mSel.disabled = true; } 
    else {
        const availableModels = [...new Set(allQuestions.filter(q => q.exam_year == year).map(q => q.exam_model))].sort();
        mSel.innerHTML = '<option value="all">Modelo: Todos</option>';
        availableModels.forEach(m => { mSel.innerHTML += `<option value="${m}">${m}</option>`; });
        mSel.disabled = false;
    }
    render();
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }
function toggleRightPanel() { document.getElementById('rightPanel').classList.toggle('visible'); }

function populateSelectors() {
    const tSel = document.getElementById('topicSelect'), ySel = document.getElementById('yearSelect');
    const topics = [...new Set(allQuestions.map(q => q.topic_name))].sort();
    const years = [...new Set(allQuestions.map(q => q.exam_year))].sort((a,b)=>b-a);
    const fill = (el, items, lbl) => {
        el.innerHTML = `<option value="all">${lbl}</option>`;
        items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
    };
    fill(tSel, topics, "Temas..."); fill(ySel, years, "Años...");
    const sortedYears = [...years].sort();
    fill(document.getElementById('autoYearFrom'), sortedYears, "Desde...");
    fill(document.getElementById('autoYearTo'), years, "Hasta...");
    fill(document.getElementById('autoYearFrom-mob'), sortedYears, "Desde...");
    fill(document.getElementById('autoYearTo-mob'), years, "Hasta...");
}

async function updateUserLevel() {
    const email = document.getElementById('adminUserEmail').value;
    const plan = document.getElementById('adminUserPlan').value;
    const status = document.getElementById('adminStatus');
    const token = await auth.currentUser.getIdToken();
    status.textContent = "Procesando...";
    try {
        const response = await fetch('https://backend-todopau.onrender.com/api/admin/set-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ email, plan })
        });
        if (response.ok) { status.textContent = "¡Éxito!"; status.className = "text-green-500 text-[10px] font-bold uppercase"; }
    } catch (e) { status.textContent = "Error"; }
}

document.addEventListener('DOMContentLoaded', () => { 
    document.getElementById('search').oninput = render; 
    switchSubject('QUIM'); 
});
</script>
</body>
</html>

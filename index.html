<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v7.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#121212', darkCard: '#1e1e1e', darkBorder: '#333333' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        :root { --subject-color: #000000; }
        body { @apply bg-gray-50 dark:bg-darkBg font-sans transition-colors duration-300 overflow-hidden h-screen flex flex-col; }
        
        /* HEADER: Materias al centro, Login a la derecha */
        .glass-header { @apply sticky top-0 z-50 flex items-center justify-between h-[70px] px-6 border-b bg-white dark:bg-darkBg dark:border-zinc-800 flex-shrink-0; }
        
        .subject-nav { @apply flex items-center gap-2 overflow-x-auto no-scrollbar max-w-[60%] mx-auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .subject-tab { @apply flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold text-gray-400 cursor-pointer transition-all border border-transparent; }
        .subject-tab.active-sub { @apply bg-gray-50 dark:bg-zinc-800 border-gray-100 dark:border-zinc-700 shadow-sm; color: var(--subject-color); }

        /* SIDEBAR: Ancho fijo de 300px */
        #sidebar { @apply fixed lg:relative top-[70px] lg:top-0 h-[calc(100vh-70px)] lg:h-auto w-[300px] bg-white dark:bg-darkBg border-r dark:border-zinc-800 z-40 transition-transform duration-300 flex-shrink-0 overflow-y-auto custom-scroll; }
        #sidebar.collapsed { transform: translateX(-100%); }

        @media (min-width: 1024px) {
            #sidebar { @apply relative top-0 translate-x-0 !important; }
            #sidebar.collapsed { @apply w-0 p-0 overflow-hidden border-none; }
        }

        /* TAGS: Se adaptan al ancho del sidebar */
        .tag-cloud { @apply flex flex-wrap gap-2 justify-start w-full; }
        .tag-item { @apply px-2 py-1 bg-gray-100 dark:bg-zinc-800 rounded-lg text-[9px] font-bold text-gray-500 cursor-pointer hover:bg-black hover:text-white transition-colors max-w-full truncate; }

        .data-row { @apply bg-white dark:bg-darkCard border dark:border-zinc-800 rounded-3xl p-6 shadow-sm mb-4; display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 768px) { 
            .data-row { grid-template-columns: 1fr 200px; grid-template-areas: "header tags" "content tags" "footer footer" "solution solution"; gap: 0 1.5rem; } 
        }

        #empty-logo { @apply absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-5 pointer-events-none w-48 md:w-64; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { @apply bg-gray-200 dark:bg-zinc-800 rounded-full; }
    </style>
</head>

<body>

<div id="menuOverlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 hidden lg:hidden"></div>

<header class="glass-header no-print">
    <div class="flex items-center gap-2 min-w-[120px]">
        <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-black italic text-lg hidden sm:block tracking-tighter">TodoPAU</span>
    </div>

    <nav class="subject-nav">
        <div onclick="switchSubject('QUIM')" id="btn-QUIM" class="subject-tab active-sub uppercase">QUÍMICA</div>
        <div onclick="switchSubject('FIS')" id="btn-FIS" class="subject-tab uppercase">FÍSICA</div>
        <div onclick="switchSubject('MATII')" id="btn-MATII" class="subject-tab uppercase">MAT II</div>
        <div onclick="switchSubject('MACSII')" id="btn-MACSII" class="subject-tab uppercase">CCSS</div>
        <div onclick="switchSubject('TINII')" id="btn-TINII" class="subject-tab uppercase">TECNO</div>
        <div onclick="switchSubject('DTECII')" id="btn-DTECII" class="subject-tab uppercase">DIBUJO</div>
    </nav>

    <div class="flex items-center gap-3 min-w-[120px] justify-end">
        <button onclick="toggleDarkMode()" class="p-2 rounded-xl text-xl">🌙</button>
        <button id="loginBtn" class="bg-black text-white dark:bg-white dark:text-black px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest">Entrar</button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden relative">
    
    <aside id="sidebar" class="no-print p-6 flex flex-col gap-6 collapsed">
        <section>
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block italic">Buscador</label>
            <input id="search" type="text" placeholder="Concepto..." class="w-full bg-gray-50 dark:bg-zinc-900 p-3 text-sm rounded-xl border dark:border-zinc-800 outline-none">
        </section>

        <section id="docenteTools" class="hidden space-y-4">
            <div class="bg-blue-50/50 dark:bg-blue-900/20 p-5 rounded-3xl border border-blue-100 dark:border-blue-800">
                <p class="text-[9px] font-black text-blue-600 uppercase mb-3 text-center">Generador de Examen</p>
                <div class="space-y-2 mb-3">
                    <input id="h-inst" type="text" placeholder="Institución" class="w-full p-2 text-[10px] rounded border dark:bg-zinc-800 outline-none">
                    <input id="h-title" type="text" placeholder="Título Examen" class="w-full p-2 text-[10px] rounded border dark:bg-zinc-800 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select id="autoYearFrom" class="p-2 text-[10px] rounded border dark:bg-zinc-800 outline-none"></select>
                    <select id="autoYearTo" class="p-2 text-[10px] rounded border dark:bg-zinc-800 outline-none"></select>
                </div>
                <div class="flex gap-2">
                    <button onclick="runSorteo()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-black text-[9px] uppercase">Sorteo</button>
                    <button onclick="printExam()" class="flex-1 py-2 bg-black text-white rounded-lg font-black text-[9px] uppercase">PDF (<span id="examCount">0</span>)</button>
                </div>
            </div>
            <button id="adminBtn" onclick="toggleAdminPanel()" class="w-full py-3 border-2 border-dashed border-red-200 text-red-500 rounded-2xl font-black text-[9px] uppercase">Gestionar Alumnos</button>
        </section>

        <section class="space-y-4 pt-2 border-t dark:border-zinc-800">
            <select id="topicSelect" onchange="updateDynamicTags(); render();" class="w-full bg-gray-50 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none border-none"></select>
            <select id="yearSelect" onchange="handleYearChange();" class="w-full bg-gray-50 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none border-none"></select>
            <select id="modelSelect" onchange="render();" class="w-full bg-gray-50 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none border-none" disabled>
                <option value="all">Modelo: Elige año</option>
            </select>
        </section>

        <div id="tagCloudSection" class="hidden">
            <label class="text-[10px] font-black text-gray-400 uppercase mb-3 block border-t dark:border-zinc-800 pt-3 text-center italic">Etiquetas</label>
            <div id="tagCloud" class="tag-cloud"></div>
        </div>
        
        <button onclick="resetFilters()" class="mt-auto py-2 text-gray-400 text-[9px] font-black uppercase hover:text-red-500 transition-colors">Limpiar Filtros</button>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-10 relative bg-[#fcfcfc] dark:bg-darkBg custom-scroll">
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-5 transition-opacity">
            <img id="empty-logo" src="https://img.icons8.com/fluency/240/test-tube.png">
            <p class="text-xl font-black uppercase tracking-[0.4em] mt-4">TodoPAU</p>
        </div>
        <div id="questions" class="max-w-4xl mx-auto flex flex-col gap-6 relative z-10"></div>
    </main>
</div>

<div id="adminPanel" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white dark:bg-darkCard w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase italic">Administración</h2>
            <button onclick="toggleAdminPanel()" class="text-2xl">✕</button>
        </div>
        <div class="space-y-6">
            <input id="adminUserEmail" type="email" placeholder="Email del alumno" class="w-full p-4 rounded-2xl border dark:bg-zinc-900 outline-none text-sm">
            <select id="adminUserPlan" class="w-full p-4 rounded-2xl border dark:bg-zinc-900 text-xs">
                <option value="estudiante">Estudiante</option>
                <option value="pro">Plan Pro</option>
                <option value="docente">Docente</option>
            </select>
            <button onclick="updateUserLevel()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg">Asignar Plan</button>
            <p id="adminStatus" class="text-[10px] text-center font-bold uppercase"></p>
        </div>
    </div>
</div>

<script>
const MI_CORREO_ADMIN = "profeabatista@gmail.com"; 

const firebaseConfig = {
    apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
    authDomain: "todopau-bat.firebaseapp.com",
    projectId: "todopau-bat",
    appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let currentSubject = "QUIM";
let allQuestions = [];
let selectedIds = new Set();
let activeTagFilter = "all";

auth.onAuthStateChanged(async user => {
    const btn = document.getElementById("loginBtn");
    const docenteTools = document.getElementById("docenteTools");
    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline mr-1"> Salir`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
        if(user.email === MI_CORREO_ADMIN) docenteTools.classList.remove('hidden');
        else {
            const tokenResult = await user.getIdTokenResult(true);
            if(tokenResult.claims.plan === 'docente') docenteTools.classList.remove('hidden');
        }
    } else {
        btn.textContent = "Entrar";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        docenteTools.classList.add('hidden');
    }
    loadData();
});

function cleanText(t) {
    if(!t) return "";
    let c = t.replace(/\\n/g, '\n');
    const map = {'3³':'ó','3a':'ía','3º':'ú','3i':'í','3e':'é','3n':'ón','3u':'ú','3A':'Á','3O':'Ó'};
    Object.keys(map).forEach(k => c = c.replace(new RegExp(k, 'g'), map[k]));
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    return c.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

async function loadData() {
    try {
        let headers = {};
        if (auth.currentUser) {
            const token = await auth.currentUser.getIdToken();
            headers = { 'Authorization': `Bearer ${token}` };
        }
        const subjects = { QUIM:'quimica', FIS:'fisica', MATII:'matii', MACSII:'macsii', TINII:'tinii', DTECII:'dtecii' };
        const res = await fetch(`https://backend-todopau.onrender.com/api/${subjects[currentSubject]}/index`, { headers });
        const idx = await res.json();
        const promises = idx.topics.map(t => fetch(`https://backend-todopau.onrender.com/api/${subjects[currentSubject]}/file?name=${t.file}`, { headers }).then(r => r.json()));
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        render();
    } catch (e) { console.error(e); }
}

function render() {
    const container = document.getElementById('questions');
    const empty = document.getElementById('empty-state');
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const model = document.getElementById('modelSelect').value;
    const term = document.getElementById('search').value.toLowerCase();

    if (year === 'all' && topic === 'all' && term === "" && model === 'all' && activeTagFilter === 'all') {
        container.innerHTML = "";
        empty.style.opacity = "1";
        return;
    }

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && 
        (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year) &&
        (model==='all' || q.exam_model === model) &&
        (activeTagFilter==='all' || q.detected_topics?.includes(activeTagFilter))
    );

    empty.style.opacity = "0";
    container.innerHTML = '';
    filtered.forEach(q => {
        const isSel = selectedIds.has(q.id);
        const card = document.createElement('div');
        card.className = `data-row ${isSel ? 'ring-2 ring-black dark:ring-white' : ''}`;
        card.innerHTML = `
            <div class="card-header-area"><h2 class="text-2xl font-black">${q.exam_year} <span class="text-[9px] text-gray-400 font-bold ml-2 uppercase">${q.exam_model || ''}</span></h2></div>
            <div class="card-content-area prose prose-sm dark:prose-invert">
                ${marked.parse(cleanText(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="w-full rounded-2xl border dark:border-zinc-800 my-4">` : ''}
            </div>
            <div class="card-tags-area">
                <span class="px-3 py-1 bg-blue-500 text-white rounded-lg text-[8px] font-black uppercase">${q.topic_name}</span>
                ${(q.detected_topics || []).map(t => `<span class="px-2 py-0.5 bg-emerald-500 text-white rounded text-[8px] font-black uppercase">${t}</span>`).join('')}
            </div>
            <div class="card-footer-area flex gap-2 border-t pt-4 dark:border-zinc-800">
                <button onclick="toggleInExam('${q.id}')" class="btn-app ${isSel ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-zinc-800'}">${isSel ? '✕ Quitar' : '+ Añadir'}</button>
                <button onclick="document.getElementById('sol-${q.id}').classList.toggle('hidden')" class="btn-app bg-gray-100 dark:bg-zinc-800">Solución</button>
            </div>
            <div id="sol-${q.id}" class="solucion-panel hidden mt-4 p-5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border-l-4 border-black dark:border-white">
                ${marked.parse(cleanText(q.solution || ""))}
            </div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

function handleYearChange() {
    const year = document.getElementById('yearSelect').value;
    const mSel = document.getElementById('modelSelect');
    if (year === 'all') { mSel.disabled = true; } 
    else {
        const models = [...new Set(allQuestions.filter(q => q.exam_year == year).map(q => q.exam_model))].sort();
        mSel.innerHTML = '<option value="all">Modelo: Todos</option>';
        models.forEach(m => { if(m) mSel.innerHTML += `<option value="${m}">${m}</option>`; });
        mSel.disabled = false;
    }
    updateDynamicTags();
    render();
}

function updateDynamicTags() {
    const topic = document.getElementById('topicSelect').value;
    const year = document.getElementById('yearSelect').value;
    const section = document.getElementById('tagCloudSection');
    if (topic === 'all' && year === 'all') { section.classList.add('hidden'); return; }
    section.classList.remove('hidden');
    const visibleQs = allQuestions.filter(q => (topic==='all'||q.topic_name===topic) && (year==='all'||q.exam_year==year));
    const counts = {};
    visibleQs.forEach(q => q.detected_topics?.forEach(t => counts[t] = (counts[t] || 0) + 1));
    const cloud = document.getElementById('tagCloud');
    cloud.innerHTML = "";
    Object.keys(counts).forEach(t => {
        const span = document.createElement('span');
        span.className = `tag-item ${activeTagFilter === t ? 'bg-black text-white' : ''}`;
        span.textContent = `${t} (${counts[t]})`;
        span.onclick = () => { activeTagFilter = (activeTagFilter === t) ? "all" : t; render(); };
        cloud.appendChild(span);
    });
}

function switchSubject(id) {
    currentSubject = id;
    const colors = { QUIM:'#00c853', FIS:'#2979ff', MATII:'#651fff', MACSII:'#f50057', TINII:'#ff9100', DTECII:'#455a64' };
    const icons = { QUIM:'test-tube', FIS:'physics', MATII:'math', MACSII:'line-chart', TINII:'circuit', DTECII:'drafting-compass' };
    document.documentElement.style.setProperty('--subject-color', colors[id]);
    document.getElementById('empty-logo').src = `https://img.icons8.com/fluency/240/${icons[id]}.png`;
    document.querySelectorAll('.subject-tab').forEach(t => t.classList.toggle('active-sub', t.id === `btn-${id}`));
    resetFilters();
    loadData();
}

function populateSelectors() {
    const tSel = document.getElementById('topicSelect'), ySel = document.getElementById('yearSelect');
    const topics = [...new Set(allQuestions.map(q => q.topic_name))].sort();
    const years = [...new Set(allQuestions.map(q => q.exam_year))].sort((a,b)=>b-a);
    const fill = (el, items, lbl) => {
        el.innerHTML = `<option value="all">${lbl}</option>`;
        items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
    };
    fill(tSel, topics, "Temas..."); fill(ySel, years, "Años...");
    fill(document.getElementById('autoYearFrom'), [...years].sort(), "Desde...");
    fill(document.getElementById('autoYearTo'), years, "Hasta...");
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }
function resetFilters() {
    document.getElementById('search').value = ""; 
    document.getElementById('topicSelect').value = "all";
    document.getElementById('yearSelect').value = "all";
    activeTagFilter = "all";
    handleYearChange();
}

document.addEventListener('DOMContentLoaded', () => { 
    document.getElementById('search').oninput = render; 
    switchSubject('QUIM'); 
});
</script>
</body>
</html>

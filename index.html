<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v6.3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#121212', darkCard: '#1e1e1e', darkBorder: '#333333' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        :root { --subject-color: #000000; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .glass-header { @apply sticky top-0 z-50 flex items-center justify-between h-[70px] px-4 border-b transition-colors bg-white/80 dark:bg-darkBg/80 backdrop-blur-md dark:border-zinc-800; }
        .subject-nav { @apply flex gap-2 p-1 bg-gray-100 dark:bg-zinc-800 rounded-2xl overflow-x-auto no-scrollbar; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .subject-tab { @apply flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold text-gray-500 transition-all cursor-pointer; }
        .subject-tab.active-sub { @apply bg-white dark:bg-zinc-700 text-black dark:text-white shadow-sm; color: var(--subject-color); }
        #sidebar { @apply fixed lg:relative top-[70px] lg:top-0 h-[calc(100vh-70px)] lg:h-auto w-[280px] bg-white dark:bg-darkBg border-r dark:border-zinc-800 z-40 transition-transform duration-300; }
        #sidebar.collapsed { transform: translateX(-100%); }
        .data-row { @apply bg-white dark:bg-darkCard border dark:border-zinc-800 rounded-3xl p-5 shadow-sm transition-all; display: grid; grid-template-columns: 1fr; grid-template-areas: "header" "tags" "content" "footer" "solution"; gap: 1rem; }
        @media (min-width: 768px) { .data-row { grid-template-columns: 1fr 200px; grid-template-areas: "header tags" "content tags" "footer footer" "solution solution"; } }
        .card-header-area { grid-area: header; } .card-tags-area { grid-area: tags; @apply flex flex-wrap md:flex-col gap-2 md:items-end; }
        .card-content-area { grid-area: content; @apply prose dark:prose-invert max-w-none text-gray-800 dark:text-gray-200; }
        .solucion-panel { grid-area: solution; @apply hidden mt-4 p-5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border-l-4; border-color: var(--subject-color); }
        .btn-native { @apply px-5 py-2.5 rounded-2xl font-extrabold text-[10px] tracking-wider uppercase transition-all active:scale-95; }
        .problem-image { @apply w-full rounded-2xl border dark:border-zinc-800 my-4 bg-white; }
        #examPanel { @apply fixed right-[-100%] top-0 w-full max-w-[400px] h-screen bg-white dark:bg-darkBg shadow-2xl z-[60] transition-all duration-500; }
        #examPanel.open { @apply right-0; }
        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }
    </style>
</head>

<body class="bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-gray-100">

<div id="menuOverlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 hidden lg:hidden"></div>

<header class="glass-header no-print">
    <div class="flex items-center gap-2">
        <button onclick="toggleMenu()" class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span class="font-black italic tracking-tighter text-lg hidden sm:block">TodoPAU</span>
    </div>

    <nav class="subject-nav">
        <div onclick="switchSubject('QUIM')" id="btn-QUIM" class="subject-tab active-sub">QUIM</div>
        <div onclick="switchSubject('FIS')" id="btn-FIS" class="subject-tab">FIS</div>
        <div onclick="switchSubject('MATII')" id="btn-MATII" class="subject-tab">MAT II</div>
        <div onclick="switchSubject('MACSII')" id="btn-MACSII" class="subject-tab">CCSS</div>
        <div onclick="switchSubject('TINII')" id="btn-TINII" class="subject-tab">TEC</div>
        <div onclick="switchSubject('DTECII')" id="btn-DTECII" class="subject-tab">DIB</div>
    </nav>

    <div class="flex items-center gap-2">
        <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-gray-100 dark:bg-zinc-800">
            <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
        </button>
        <button id="loginBtn" class="btn-native bg-gray-100 dark:bg-zinc-800 text-gray-600 dark:text-gray-300">Login</button>
        <button onclick="openExamPanel()" class="btn-native bg-black text-white dark:bg-white dark:text-black">EXAM (<span id="examCount">0</span>)</button>
    </div>
</header>

<div class="flex h-[calc(100vh-70px)] overflow-hidden">
    <aside id="sidebar" class="p-6 flex flex-col gap-6 collapsed no-print overflow-y-auto">
        <section>
            <label class="text-[10px] font-black text-gray-400 uppercase mb-3 block">Buscador</label>
            <input id="search" type="text" placeholder="Buscar..." class="w-full bg-gray-50 dark:bg-zinc-900 p-3 text-sm outline-none rounded-xl border-b-2 border-transparent focus:border-black dark:focus:border-white transition-all">
        </section>

        <section class="space-y-4">
            <select id="topicSelect" onchange="updateDynamicTags(); render();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none"></select>
            <select id="yearSelect" onchange="updateDynamicTags(); render();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none"></select>
        </section>

        <div id="tagCloudSection" class="hidden">
            <label class="text-[10px] font-black text-gray-400 uppercase mb-4 block border-t dark:border-zinc-800 pt-4">Etiquetas</label>
            <div id="tagCloud" class="flex flex-wrap gap-2"></div>
        </div>
        
        <button onclick="resetFilters()" class="mt-auto py-3 text-[9px] font-black text-red-500 uppercase border border-red-100 dark:border-red-900 rounded-xl">Limpiar Filtros</button>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-10 relative bg-[#fcfcfc] dark:bg-darkBg">
        <div id="stats" class="mb-8 text-[10px] font-black text-gray-400 text-center uppercase tracking-widest">Selecciona un bloque</div>
        <div id="questions" class="max-w-4xl mx-auto flex flex-col gap-6 pb-20"></div>
        <div id="loader" class="hidden text-center py-20 italic opacity-40">Cargando base de datos...</div>
    </main>

    <div id="examPanel" class="p-8 flex flex-col no-print border-l dark:border-zinc-800">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-sm uppercase tracking-widest">Configurador de Examen</h2>
            <button onclick="document.getElementById('examPanel').classList.remove('open')" class="text-xl">✕</button>
        </div>
        
        <div class="flex-1 space-y-6 overflow-y-auto no-scrollbar">
            <div class="p-5 bg-blue-50 dark:bg-blue-900/10 rounded-3xl border border-blue-100 dark:border-blue-900/30">
                <p class="text-[10px] font-black text-blue-600 uppercase mb-4">Sorteo Aleatorio</p>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <select id="autoYearFrom" class="w-full p-2 text-[10px] rounded-lg border dark:bg-zinc-900 dark:border-zinc-700"></select>
                    <select id="autoYearTo" class="w-full p-2 text-[10px] rounded-lg border dark:bg-zinc-900 dark:border-zinc-700"></select>
                </div>
                <div class="flex gap-2">
                    <input id="autoNumInput" type="number" placeholder="Cant." class="w-20 p-2 text-[10px] rounded-lg border dark:bg-zinc-900 dark:border-zinc-700">
                    <button onclick="runSorteo()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-black text-[10px]">SORTEAR</button>
                </div>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-black text-gray-400 uppercase">Cabecera PDF</p>
                <input id="h-inst" type="text" placeholder="Institución" class="w-full p-3 rounded-xl text-xs bg-gray-50 dark:bg-zinc-900 border dark:border-zinc-800">
                <input id="h-title" type="text" placeholder="Título Examen" class="w-full p-3 rounded-xl text-xs bg-gray-50 dark:bg-zinc-900 border dark:border-zinc-800">
                <textarea id="h-instr" placeholder="Instrucciones..." class="w-full p-3 rounded-xl text-xs bg-gray-50 dark:bg-zinc-900 border dark:border-zinc-800 h-20"></textarea>
            </div>

            <button onclick="printExam()" class="w-full py-5 bg-black dark:bg-white text-white dark:text-black rounded-3xl font-black text-[11px] tracking-widest shadow-xl">GENERAR PDF</button>
        </div>
    </div>
</div>

<script>
// Firebase Config (Tu config original)
const firebaseConfig = {
  apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
  authDomain: "todopau-bat.firebaseapp.com",
  projectId: "todopau-bat",
  appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
window.isUserLogged = false;

auth.onAuthStateChanged(user => {
    const btn = document.getElementById("loginBtn");
    window.isUserLogged = !!user;
    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline mr-1"> Salir`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
    } else {
        btn.textContent = "Google Login";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }
    render();
});

// Modo Oscuro
function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
}

// Variables Globales
const subjectConfig = {
    'QUIM': { folder: 'quimica', color: '#00c853', title: 'Química' },
    'FIS': { folder: 'fisica', color: '#2979ff', title: 'Física' },
    'MATII': { folder: 'matii', color: '#651fff', title: 'Matemáticas II' },
    'MACSII': { folder: 'macsii', color: '#f50057', title: 'Matemáticas CCSS' },
    'TINII': { folder: 'tinii', color: '#ff9100', title: 'Tecnología Industrial' },
    'DTECII': { folder: 'dtecii', color: '#455a64', title: 'Dibujo Técnico' }
};

let currentSubject = "QUIM";
let allQuestions = [];
let selectedIds = new Set();
let activeTagFilter = "all";

// Limpieza de Texto (Isótopos y Fórmulas)
function autoChem(text) {
    if (!text) return "";
    let clean = text.replace(/\\n/g, '\n');
    const encodingMap = {'3³': 'ó', '3a': 'ía', '3º': 'ú', '3i': 'í', '3e': 'é', '3n': 'ón', '3u': 'ú', '3A': 'Á', '3O': 'Ó'};
    Object.keys(encodingMap).forEach(key => clean = clean.replace(new RegExp(key, 'g'), encodingMap[key]));
    
    // Iones y Superíndices
    const chg = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','+':'⁺','-':'⁻'};
    clean = clean.replace(/([A-Z][a-z]?|[\)])(\d*)([\+\-])(?=\s|$|\.|\,)/g, (m, e, n, s) => e + n.split('').map(x=>chg[x]).join('') + chg[s]);
    
    // Subíndices químicos
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    return clean.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

async function loadData() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    try {
        const res = await fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/index`);
        const idx = await res.json();
        const promises = idx.topics.map(t => fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/file?name=${t.file}`).then(r => r.json()));
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        loader.classList.add('hidden');
        render();
    } catch (e) { loader.classList.add('hidden'); }
}

function render() {
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const term = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('questions');

    if (!term && year === 'all' && topic === 'all' && activeTagFilter === 'all') {
        container.innerHTML = ''; return;
    }

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year) && (activeTagFilter==='all'||q.detected_topics?.includes(activeTagFilter))
    );

    document.getElementById('stats').textContent = `${filtered.length} RESULTADOS`;
    container.innerHTML = '';
    
    filtered.forEach(q => {
        const isSel = selectedIds.has(q.id);
        const card = document.createElement('div');
        card.className = `data-row ${isSel ? 'ring-2 ring-black dark:ring-white' : ''}`;
        card.innerHTML = `
            <div class="card-header-area">
                <h2 class="text-3xl font-black">${q.exam_year}</h2>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${q.exam_model || ''}</span>
            </div>
            <div class="card-tags-area">
                <span class="px-3 py-1 bg-blue-500 text-white rounded-lg text-[9px] font-black uppercase">${q.topic_name}</span>
                ${(q.detected_topics || []).map(t => `<span class="px-3 py-1 bg-emerald-500 text-white rounded-lg text-[9px] font-black uppercase">${t}</span>`).join('')}
            </div>
            <div class="card-content-area">
                ${marked.parse(autoChem(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="problem-image" loading="lazy">` : ''}
            </div>
            <div class="card-footer-area">
                <div class="flex gap-2">
                    <button onclick="toggleInExam('${q.id}')" class="btn-native ${isSel ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-zinc-800'}">
                        ${isSel ? '✕ Quitar' : '+ Seleccionar'}
                    </button>
                    <button onclick="document.getElementById('sol-${q.id}').classList.toggle('hidden')" class="btn-native bg-gray-100 dark:bg-zinc-800">Solución</button>
                </div>
                <span class="text-[9px] font-mono opacity-30 italic">${q.community || ''}</span>
            </div>
            <div id="sol-${q.id}" class="solucion-panel">
                <p class="text-[9px] font-black opacity-40 uppercase mb-2">Resolución sugerida</p>
                ${marked.parse(autoChem(q.solution || ""))}
            </div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

// Lógica de Sorteo
function runSorteo() {
    const from = parseInt(document.getElementById('autoYearFrom').value);
    const to = parseInt(document.getElementById('autoYearTo').value);
    const num = parseInt(document.getElementById('autoNumInput').value) || 1;
    
    let pool = allQuestions.filter(q => (isNaN(from) || q.exam_year >= from) && (isNaN(to) || q.exam_year <= to));
    if(pool.length === 0) return alert("Sin preguntas en ese rango");
    
    selectedIds.clear();
    const shuffled = pool.sort(() => 0.5 - Math.random());
    shuffled.slice(0, num).forEach(q => selectedIds.add(q.id));
    document.getElementById('examCount').textContent = selectedIds.size;
    render();
}

// Lógica de Impresión PDF (RESTABLECIDO)
function printExam() {
    if(!window.isUserLogged) return alert("Inicia sesión para generar PDFs");
    const qs = allQuestions.filter(q => selectedIds.has(q.id));
    if (qs.length === 0) return alert("Selecciona preguntas primero");

    const win = window.open('', '_blank');
    const hData = {
        inst: document.getElementById('h-inst').value || "INSTITUCIÓN EDUCATIVA",
        title: document.getElementById('h-title').value || "EXAMEN DE PRÁCTICA",
        instr: document.getElementById('h-instr').value || ""
    };

    let content = `<html><head><title>Examen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        body{font-family:'Lora', serif; padding:50px; line-height:1.6;}
        .header{border-bottom:2px solid #000; padding-bottom:15px; margin-bottom:40px;}
        .exercise{margin-bottom:40px; page-break-inside:avoid;}
        .img-pdf{max-width:400px; display:block; margin:20px 0;}
        h1{margin:0; font-size:24px;}
        sub{font-size:0.75em;}
    </style></head><body>
    <div class="header">
        <h1>${hData.inst}</h1>
        <p><strong>${hData.title}</strong> - ${subjectConfig[currentSubject].title}</p>
        <p>Estudiante: _________________________________________ Fecha: ___/___/___</p>
        <p style="font-size:12px; font-style:italic;">${hData.instr}</p>
    </div>`;

    qs.forEach((q, i) => {
        content += `<div class="exercise">
            <strong>EJERCICIO ${i+1} (${q.exam_year} - ${q.exam_model || ''})</strong><br>
            ${marked.parse(autoChem(q.text))}
            ${q.has_image ? `<img src="${q.image_data}" class="img-pdf">` : ''}
        </div>`;
    });

    content += `<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"><\/script>
    <script>
        renderMathInElement(document.body, {delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}]});
        setTimeout(() => { window.print(); }, 1000);
    <\/script></body></html>`;

    win.document.write(content);
    win.document.close();
}

// Utilidades Interfaz
function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('menuOverlay');
    sidebar.classList.toggle('collapsed');
    if(window.innerWidth < 1024) overlay.classList.toggle('hidden');
}

function openExamPanel() {
    if(!window.isUserLogged) return alert("Inicia sesión primero");
    document.getElementById('examPanel').classList.add('open');
}

function switchSubject(id) {
    currentSubject = id;
    document.documentElement.style.setProperty('--subject-color', subjectConfig[id].color);
    document.querySelectorAll('.subject-tab').forEach(b => b.classList.remove('active-sub'));
    document.getElementById(`btn-${id}`).classList.add('active-sub');
    if(window.innerWidth < 1024) toggleMenu();
    loadData();
}

function toggleInExam(id) {
    selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
    document.getElementById('examCount').textContent = selectedIds.size;
    render();
}

function populateSelectors() {
    const tSel = document.getElementById('topicSelect'), ySel = document.getElementById('yearSelect');
    const topics = [...new Set(allQuestions.map(q => q.topic_name))].sort();
    const years = [...new Set(allQuestions.map(q => q.exam_year))].sort((a,b)=>b-a);
    const fill = (el, items, lbl) => {
        el.innerHTML = `<option value="all">${lbl}</option>`;
        items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
    };
    fill(tSel, topics, "Bloque Temático"); fill(ySel, years, "Año Convocatoria");
    fill(document.getElementById('autoYearFrom'), [...years].sort(), "Desde...");
    fill(document.getElementById('autoYearTo'), years, "Hasta...");
}

function updateDynamicTags() {
    const topic = document.getElementById('topicSelect').value, year = document.getElementById('yearSelect').value;
    const section = document.getElementById('tagCloudSection');
    if (topic === 'all' && year === 'all') return section.classList.add('hidden');
    section.classList.remove('hidden');
    const visibleQs = allQuestions.filter(q => (topic==='all'||q.topic_name===topic) && (year==='all'||q.exam_year==year));
    const counts = {};
    visibleQs.forEach(q => q.detected_topics?.forEach(t => counts[t] = (counts[t] || 0) + 1));
    const cloud = document.getElementById('tagCloud'); cloud.innerHTML = "";
    Object.keys(counts).forEach(t => {
        const span = document.createElement('span');
        span.className = `px-3 py-1 bg-gray-100 dark:bg-zinc-800 text-[9px] font-bold rounded-lg cursor-pointer hover:bg-black dark:hover:bg-white hover:text-white dark:hover:text-black transition-colors ${activeTagFilter === t ? 'bg-black text-white dark:bg-white dark:text-black' : ''}`;
        span.textContent = t;
        span.onclick = () => { activeTagFilter = (activeTagFilter === t) ? "all" : t; render(); };
        cloud.appendChild(span);
    });
}

function resetFilters() {
    document.getElementById('search').value = ""; document.getElementById('topicSelect').value = "all";
    document.getElementById('yearSelect').value = "all"; activeTagFilter = "all"; render();
}

document.addEventListener('DOMContentLoaded', () => { document.getElementById('search').oninput = render; switchSubject('QUIM'); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v6.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        
        :root { --bg: #F8F9FA; --subject-color: #000000; --subject-soft: rgba(0,0,0,0.05); }
        
        /* Gestión de Scroll Dinámica */
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #1a1a1a; overflow-x: hidden; }
        
        /* Header Adaptativo */
        .glass-header { 
            background: white; border-bottom: 1px solid #eee; 
            padding: 0.5rem 1rem; display: flex; align-items: center; 
            justify-content: space-between; height: 70px; sticky top-0 z-50;
        }

        /* Navegación con Scroll Horizontal en Móvil */
        .subject-nav { 
            display: flex; gap: 6px; align-items: center; 
            background: #f1f5f9; padding: 4px; border-radius: 14px;
            overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .subject-nav::-webkit-scrollbar { display: none; }
        .subject-tab { 
            flex-shrink: 0; display: flex; align-items: center; gap: 6px; 
            padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; 
            font-weight: 600; color: #64748b; transition: 0.2s; cursor: pointer; 
        }
        .subject-tab.active-sub { background: white; color: var(--subject-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* Sidebar Inteligente (Drawer en Móvil, Columna en Desktop) */
        #sidebar { 
            width: 280px; position: fixed; left: 0; top: 70px; bottom: 0;
            background: white; border-right: 1px solid #eee; z-index: 45;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.collapsed { transform: translateX(-100%); }

        @media (min-width: 1024px) {
            #sidebar { position: relative; top: 0; transform: none !important; }
            #sidebar.collapsed { width: 0; overflow: hidden; border: none; }
            body { overflow: hidden; } /* Bloqueamos scroll body solo en PC */
        }

        /* GRID RESPONSIVO DE LA TARJETA (Imagen 5 Optimizado) */
        .data-row { 
            display: grid; grid-template-columns: 1fr;
            grid-template-areas: "header" "tags" "content" "solution" "footer";
            gap: 1rem; background: white; border-radius: 16px; 
            border: 1px solid #eee; padding: 1.25rem; transition: 0.2s;
        }

        @media (min-width: 768px) {
            .data-row {
                grid-template-columns: 1fr 220px;
                grid-template-areas: "header tags" "content tags" "solution solution" "footer footer";
            }
        }

        .card-header-area { grid-area: header; }
        .card-tags-area { grid-area: tags; display: flex; flex-wrap: wrap; gap: 0.4rem; }
        @media (min-width: 768px) { .card-tags-area { flex-direction: column; align-items: flex-end; } }
        .card-content-area { grid-area: content; margin-top: -0.25rem; }
        .solucion-panel { grid-area: solution; }
        .card-footer-area { grid-area: footer; }

        /* Elementos UI */
        .tag-badge { font-size: 9px; font-weight: 800; padding: 3px 10px; border-radius: 8px; text-transform: uppercase; }
        .pill-topic { background: #3b82f6; color: white; } 
        .pill-content { background: #10b981; color: white; }
        
        #examPanel { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; 
            height: 100vh; background: white; z-index: 100; transition: 0.4s; 
        }
        #examPanel.open { right: 0; }
        
        .overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 40; }
        
        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }
        .problem-image { width: 100%; height: auto; border-radius: 8px; margin: 1rem 0; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="h-screen flex flex-col">

<div id="menuOverlay" onclick="toggleMenu()" class="overlay fixed inset-0 hidden lg:hidden"></div>

<header class="glass-header no-print">
    <div class="flex items-center gap-2">
        <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 rounded-lg">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="flex flex-col hidden sm:flex">
            <span class="font-black text-md tracking-tighter italic leading-none">PEvAU-DB</span>
            <span class="text-[8px] font-bold text-gray-400 uppercase">v6.1 Responsive</span>
        </div>
    </div>

    <nav class="subject-nav mx-2">
        <div onclick="switchSubject('QUIM')" id="btn-QUIM" class="subject-tab active-sub">Química</div>
        <div onclick="switchSubject('FIS')" id="btn-FIS" class="subject-tab">Física</div>
        <div onclick="switchSubject('MATII')" id="btn-MATII" class="subject-tab">Mat II</div>
        <div onclick="switchSubject('MACSII')" id="btn-MACSII" class="subject-tab">CCSS II</div>
        <div onclick="switchSubject('TINII')" id="btn-TINII" class="subject-tab">Tecno</div>
        <div onclick="switchSubject('DTECII')" id="btn-DTECII" class="subject-tab">Dibujo</div>
    </nav>

    <div class="flex items-center gap-2">
        <button id="loginBtn" class="bg-white border px-3 py-1.5 rounded-xl text-[10px] font-bold">Google</button>
        <button onclick="openExamPanel()" class="bg-black text-white px-3 py-1.5 rounded-xl text-[10px] font-bold shadow-lg">
            EXAM(<span id="examCount">0</span>)
        </button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden relative">
    
    <aside id="sidebar" class="no-print p-6 flex flex-col gap-6 overflow-y-auto custom-scroll collapsed">
        <button onclick="resetFilters()" class="w-full py-2 bg-gray-50 text-gray-400 text-[9px] font-black uppercase rounded-lg">Limpiar Filtros</button>

        <section>
            <label class="text-[10px] uppercase font-bold text-gray-400 mb-2 block tracking-widest">Buscador</label>
            <input id="search" type="text" placeholder="Concepto..." class="w-full border-b p-2 text-sm outline-none">
        </section>

        <section class="space-y-4">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 mb-2 block tracking-widest">Bloque</label>
                <select id="topicSelect" onchange="updateDynamicTags(); render();" class="w-full border rounded-xl p-2 text-xs bg-gray-50"></select>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 mb-2 block tracking-widest">Año</label>
                <select id="yearSelect" onchange="updateDynamicTags(); render();" class="w-full border rounded-xl p-2 text-xs bg-gray-50"></select>
            </div>
        </section>

        <section id="tagCloudSection" class="hidden">
            <label class="text-[10px] uppercase font-bold text-gray-400 mb-4 block tracking-widest border-t pt-4">Etiquetas</label>
            <div id="tagCloud" class="flex flex-wrap gap-2"></div>
        </section>
    </aside>

    <main id="mainContent" class="flex-1 overflow-y-auto p-4 md:p-8 relative bg-[#fcfcfc] custom-scroll">
        <img id="placeholder-icon" src="https://img.icons8.com/fluency/240/test-tube.png" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-5 w-48 md:w-64 pointer-events-none">
        <div id="stats" class="mb-4 text-[9px] font-black text-gray-300 uppercase tracking-widest text-center italic">Selecciona un bloque</div>
        <div id="questions" class="max-w-4xl mx-auto flex flex-col gap-4"></div>
        <div id="loader" class="hidden text-center py-10 opacity-30 italic">Cargando...</div>
    </main>

    <div id="examPanel" class="no-print flex flex-col shadow-2xl">
        <div class="p-6 flex items-center justify-between border-b">
            <h3 class="font-black text-sm tracking-widest uppercase">Generar Examen</h3>
            <button onclick="document.getElementById('examPanel').classList.remove('open')" class="text-gray-400">✕</button>
        </div>
        <div class="p-6 flex-1 space-y-6 overflow-y-auto custom-scroll">
            <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                <p class="text-[9px] font-black text-blue-800 uppercase italic mb-2">Sorteo</p>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <select id="autoYearFrom" class="border rounded p-2 text-[10px]"></select>
                    <select id="autoYearTo" class="border rounded p-2 text-[10px]"></select>
                </div>
                <button onclick="runSorteo()" class="w-full py-2 bg-blue-600 text-white rounded-lg font-black text-[9px]">SORTEAR</button>
            </div>
            <button onclick="printExam()" class="w-full py-4 bg-black text-white rounded-2xl text-[10px] font-black tracking-widest">GENERAR PDF</button>
        </div>
    </div>
</div>

<script>
/* --- CONFIGURACIÓN FIREBASE --- */
const firebaseConfig = {
  apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
  authDomain: "todopau-bat.firebaseapp.com",
  projectId: "todopau-bat",
  appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
window.isUserLogged = false;

auth.onAuthStateChanged(user => {
    const btn = document.getElementById("loginBtn");
    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline"> Salir`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
        window.isUserLogged = true;
    } else {
        btn.textContent = "Google";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        window.isUserLogged = false;
    }
    render();
});

/* --- LÓGICA DE APLICACIÓN --- */
const subjectConfig = {
    'QUIM': { folder: 'quimica', icon: 'https://img.icons8.com/fluency/48/test-tube.png', color: '#00c853' },
    'FIS': { folder: 'fisica', icon: 'https://img.icons8.com/fluency/48/physics.png', color: '#2979ff' },
    'MATII': { folder: 'matii', icon: 'https://img.icons8.com/fluency/48/math.png', color: '#651fff' },
    'MACSII': { folder: 'macsii', icon: 'https://img.icons8.com/fluency/48/line-chart.png', color: '#f50057' },
    'TINII': { folder: 'tinii', icon: 'https://img.icons8.com/fluency/48/circuit.png', color: '#ff9100' },
    'DTECII': { folder: 'dtecii', icon: 'https://img.icons8.com/fluency/48/drafting-compass.png', color: '#455a64' }
};

let currentSubject = "QUIM";
let allQuestions = [];
let selectedIds = new Set();
let activeTagFilter = "all";

// Función para alternar menú en móvil
function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('menuOverlay');
    sidebar.classList.toggle('collapsed');
    if(window.innerWidth < 1024) overlay.classList.toggle('hidden');
}

function openExamPanel() {
    if(!window.isUserLogged) return alert("Inicia sesión primero");
    document.getElementById('examPanel').classList.add('open');
}

// Motor de Limpieza Químico/Matemático
function cleanTextEngine(text) {
    if (!text) return "";
    let clean = text.replace(/\\n/g, '\n');
    const encodingMap = {'3³': 'ó', '3a': 'ía', '3º': 'ú', '3i': 'í', '3e': 'é', '3n': 'ón', '3u': 'ú', '3A': 'Á', '3O': 'Ó'};
    Object.keys(encodingMap).forEach(key => clean = clean.replace(new RegExp(key, 'g'), encodingMap[key]));
    
    // Iones e Isótopos (Unicode)
    const chg = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','+':'⁺','-':'⁻'};
    clean = clean.replace(/([A-Z][a-z]?|[\)])(\d*)([\+\-])(?=\s|$|\.|\,)/g, (m, e, n, s) => e + n.split('').map(x=>chg[x]).join('') + chg[s]);
    return clean;
}

function autoChem(text) {
    if (!text) return "";
    let clean = cleanTextEngine(text);
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    return clean.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

async function loadData() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    try {
        const response = await fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/index`);
        const index = await response.json();
        const promises = index.topics.map(async t => {
            const res = await fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/file?name=${t.file}`);
            return res.json();
        });
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        loader.classList.add('hidden');
        render();
    } catch (e) { console.error(e); loader.classList.add('hidden'); }
}

function render() {
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const term = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('questions');

    if (!term && year === 'all' && topic === 'all' && activeTagFilter === 'all') {
        container.innerHTML = ''; document.getElementById('placeholder-icon').style.display = 'block'; return;
    }
    document.getElementById('placeholder-icon').style.display = 'none';

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year) && (activeTagFilter==='all'||q.detected_topics?.includes(activeTagFilter))
    );

    document.getElementById('stats').textContent = `${filtered.length} RESULTADOS`;
    container.innerHTML = '';
    
    filtered.forEach(q => {
        const isSel = selectedIds.has(q.id);
        const card = document.createElement('div');
        card.className = `data-row ${isSel ? 'ring-2 ring-black' : ''}`;
        card.innerHTML = `
            <div class="card-header-area">
                <h2 class="text-2xl font-black">${q.exam_year}</h2>
                <span class="text-[9px] font-bold text-gray-400 uppercase">${q.exam_model || ''}</span>
            </div>
            <div class="card-tags-area">
                <span class="tag-badge pill-topic">${q.topic_name}</span>
                ${(q.detected_topics || []).map(t => `<span class="tag-badge pill-content">${t}</span>`).join('')}
            </div>
            <div class="card-content-area prose prose-sm text-gray-700">
                ${marked.parse(autoChem(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="problem-image" loading="lazy">` : ''}
            </div>
            <div class="card-footer-area flex gap-2 border-t pt-4">
                <button onclick="toggleInExam('${q.id}')" class="text-[9px] font-black px-4 py-2 rounded-lg border ${isSel ? 'bg-red-500 text-white' : 'bg-gray-100'}">
                    ${isSel ? 'QUITAR' : 'SELECCIONAR'}
                </button>
                <button onclick="toggleSolucion('${q.id}')" class="text-[9px] font-black px-4 py-2 rounded-lg border">SOLUCIÓN</button>
            </div>
            <div id="sol-${q.id}" class="solucion-panel hidden prose prose-sm mt-4 p-4 bg-gray-50 rounded-xl">
                ${marked.parse(autoChem(q.solution || ""))}
            </div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

/* --- UTILIDADES RESTANTES --- */
function switchSubject(id) {
    currentSubject = id;
    document.querySelectorAll('.subject-tab').forEach(b => b.classList.remove('active-sub'));
    document.getElementById(`btn-${id}`).classList.add('active-sub');
    if(window.innerWidth < 1024) toggleMenu();
    loadData();
}

function toggleSolucion(id) {
    if(!window.isUserLogged) return alert("Inicia sesión");
    document.getElementById(`sol-${id}`).classList.toggle('hidden');
}

function toggleInExam(id) {
    selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
    document.getElementById('examCount').textContent = selectedIds.size;
    render();
}

function populateSelectors() {
    const tSel = document.getElementById('topicSelect'), ySel = document.getElementById('yearSelect');
    const topics = [...new Set(allQuestions.map(q => q.topic_name))].sort();
    const years = [...new Set(allQuestions.map(q => q.exam_year))].sort((a,b)=>b-a);
    const fill = (el, items, lbl) => {
        el.innerHTML = `<option value="all">${lbl}</option>`;
        items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
    };
    fill(tSel, topics, "Bloque: Todos"); fill(ySel, years, "Año: Todos");
    fill(document.getElementById('autoYearFrom'), [...years].sort(), "Desde...");
    fill(document.getElementById('autoYearTo'), years, "Hasta...");
}

function updateDynamicTags() {
    const topic = document.getElementById('topicSelect').value, year = document.getElementById('yearSelect').value;
    const section = document.getElementById('tagCloudSection');
    if (topic === 'all' && year === 'all') return section.classList.add('hidden');
    section.classList.remove('hidden');
    const visibleQs = allQuestions.filter(q => (topic==='all'||q.topic_name===topic) && (year==='all'||q.exam_year==year));
    const counts = {};
    visibleQs.forEach(q => q.detected_topics?.forEach(t => counts[t] = (counts[t] || 0) + 1));
    const cloud = document.getElementById('tagCloud'); cloud.innerHTML = "";
    Object.keys(counts).forEach(t => {
        const span = document.createElement('span');
        span.className = `tag-cloud-item ${activeTagFilter === t ? 'active-tag' : ''}`;
        span.textContent = t;
        span.onclick = () => { activeTagFilter = (activeTagFilter === t) ? "all" : t; render(); };
        cloud.appendChild(span);
    });
}

function resetFilters() {
    document.getElementById('search').value = ""; document.getElementById('topicSelect').value = "all";
    document.getElementById('yearSelect').value = "all"; activeTagFilter = "all"; render();
}

document.addEventListener('DOMContentLoaded', () => { document.getElementById('search').oninput = render; switchSubject('QUIM'); });
</script>
</body>
</html>

        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }

<script>
/* CONFIGURACIÓN */
const firebaseConfig = { apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk", authDomain: "todopau-bat.firebaseapp.com", projectId: "todopau-bat", appId: "1:329604600256:web:d0b43bc40bb2c821c67825" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
window.userPlan = 'basico'; 

auth.onAuthStateChanged(async user => {
    const btn = document.getElementById("loginBtn");
    if (user) {
        // AQUÍ CONECTARÍAS CON TU BACKEND PARA OBTENER EL PLAN REAL
        // window.userPlan = await fetchPlan(user.uid); 
        window.userPlan = 'docente'; // Simulamos plan docente para pruebas
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline">`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
    } else {
        window.userPlan = 'basico';
        btn.textContent = "Entrar";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }
    updatePlanUI();
    render();
});

function updatePlanUI() {
    // Control de visibilidad del generador
    const isDocente = window.userPlan === 'docente';
    document.getElementById('rightPanel').classList.toggle('hidden', !isDocente);
    document.getElementById('docentePanelMob').classList.toggle('hidden', !isDocente);
}

const subjectConfig = { 'QUIM': { folder: 'quimica', color: '#00c853' }, 'FIS': { folder: 'fisica', color: '#2979ff' }, 'MATII': { folder: 'matii', color: '#651fff' }, 'MACSII': { folder: 'macsii', color: '#f50057' }, 'TINII': { folder: 'tinii', color: '#ff9100' }, 'DTECII': { folder: 'dtecii', color: '#455a64' } };
let currentSubject = "QUIM", allQuestions = [], selectedIds = new Set(), activeTagFilter = "all";

function cleanText(t) {
    if(!t) return "";
    let c = t.replace(/\\n/g, '\n');
    const map = {'3³':'ó','3a':'ía','3º':'ú','3i':'í','3e':'é','3n':'ón','3u':'ú','3A':'Á','3O':'Ó'};
    Object.keys(map).forEach(k => c = c.replace(new RegExp(k, 'g'), map[k]));
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    const chg = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','+':'⁺','-':'⁻'};
    c = c.replace(/([A-Z][a-z]?|[\)])(\d*)([\+\-])(?=\s|$|\.|\,)/g, (m, e, n, s) => e + n.split('').map(x=>chg[x]).join('') + chg[s]);
    return c.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

async function loadData() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    try {
        const response = await fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/index`);
        const index = await response.json();
        const promises = index.topics.map(t => fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/file?name=${t.file}`).then(r => r.json()));
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        loader.classList.add('hidden');
        render();
    } catch (e) { loader.classList.add('hidden'); }
}

function render() {
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const model = document.getElementById('modelSelect').value;
    const term = document.getElementById('search').value

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v6.6</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#121212', darkCard: '#1e1e1e', darkBorder: '#333333' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        :root { --bg: #F8F9FA; --subject-color: #000000; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; transition: background 0.3s; overflow-x: hidden; }
        
        .glass-header { background: white; border-bottom: 1px solid #eee; padding: 0.5rem 1rem; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-50; }
        .dark .glass-header { background: #121212; border-color: #333; }

        .subject-nav { display: flex; gap: 6px; align-items: center; background: #f1f5f9; padding: 4px; border-radius: 14px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .dark .subject-nav { background: #1e1e1e; }
        .subject-nav::-webkit-scrollbar { display: none; }
        .subject-tab { flex-shrink: 0; padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; }
        .subject-tab.active-sub { background: white; color: var(--subject-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .dark .subject-tab.active-sub { background: #333; color: white; }

        /* Sidebar Izquierdo corregido */
        #sidebar { width: 280px; position: fixed; left: 0; top: 70px; bottom: 0; background: white; border-right: 1px solid #eee; z-index: 45; transition: all 0.3s ease; }
        .dark #sidebar { background: #121212; border-color: #333; }
        #sidebar.collapsed { transform: translateX(-100%); width: 0; padding: 0; visibility: hidden; }

        @media (min-width: 1024px) {
            #sidebar { position: relative; top: 0; transform: none !important; }
            #sidebar.collapsed { width: 0; margin-left: -280px; visibility: hidden; }
        }

        /* Panel Derecho corregido */
        #rightPanel { width: 320px; background: white; border-left: 1px solid #eee; padding: 1.5rem; overflow-y: auto; transition: all 0.3s ease; }
        .dark #rightPanel { background: #121212; border-color: #333; }
        #rightPanel.collapsed { width: 0; padding: 0; margin-right: -320px; visibility: hidden; }

        /* GRID RESPONSIVO */
        .data-row { 
            display: grid; grid-template-columns: 1fr; 
            grid-template-areas: "header" "content" "tags" "solution" "footer"; 
            gap: 0.75rem; background: white; border-radius: 20px; border: 1px solid #eee; padding: 1.25rem; 
        }
        .dark .data-row { background: #1e1e1e; border-color: #333; }
        
        @media (min-width: 768px) { 
            .data-row { 
                grid-template-columns: 1fr 220px; 
                grid-template-areas: "header tags" "content tags" "solution solution" "footer footer"; 
                gap: 0 1.5rem;
            } 
        }

        .card-header-area { grid-area: header; }
        .card-content-area { grid-area: content; align-self: start; }
        .card-tags-area { grid-area: tags; display: flex; flex-wrap: wrap; gap: 0.4rem; align-self: start; }
        @media (min-width: 768px) { .card-tags-area { flex-direction: column; align-items: flex-end; } }
        .solucion-panel { grid-area: solution; }
        .card-footer-area { grid-area: footer; }

        .btn-app { @apply px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all active:scale-95; border: 1px solid transparent; }
        .btn-sol-active { background: var(--subject-color) !important; color: white !important; border-radius: 0.75rem !important; }
        
        .problem-image { width: 100%; border-radius: 12px; margin: 1rem 0; }
        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

                <p class="text-[9px] font-black text-blue-800 dark:text-blue-300 uppercase">Sorteo Aleatorio</p>

<div onclick="toggleAdminPanel()" style="position:fixed; bottom:0; left:0; width:40px; height:40px; cursor:pointer; opacity:0; z-index:250;" title="Panel Admin"></div>

<script>
// --- FIREBASE & APP ---
const firebaseConfig = {
    apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
    authDomain: "todopau-bat.firebaseapp.com",
    projectId: "todopau-bat",
    appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
    const btn = document.getElementById("loginBtn");
    window.isUserLogged = !!user;
    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline">`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
    } else {
        btn.textContent = "Entrar";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }
    render();
});

function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

const subjectConfig = {
    'QUIM': { folder: 'quimica', color: '#00c853' },
    'FIS': { folder: 'fisica', color: '#2979ff' },
    'MATII': { folder: 'matii', color: '#651fff' },
    'MACSII': { folder: 'macsii', color: '#f50057' },
    'TINII': { folder: 'tinii', color: '#ff9100' },
    'DTECII': { folder: 'dtecii', color: '#455a64' }
};

let currentSubject = "QUIM";
let allQuestions = [];
let selectedIds = new Set();
let activeTagFilter = "all";

// --- UI FUNCTIONS ---
function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    const o = document.getElementById('menuOverlay');
    if(window.innerWidth < 1024) o.classList.toggle('hidden');
}

function toggleRightPanel() {
    document.getElementById('rightPanel').classList.toggle('collapsed');
}

function toggleAdminPanel() {
    console.log("Admin trigger pulsado");
    document.getElementById('adminPanel').classList.toggle('hidden');
}

function cleanText(t) {
    if(!t) return "";
    let c = t.replace(/\\n/g, '\n');
    const map = {'3³':'ó','3a':'ía','3º':'ú','3i':'í','3e':'é','3n':'ón','3u':'ú','3A':'Á','3O':'Ó'};
    Object.keys(map).forEach(k => c = c.replace(new RegExp(k, 'g'), map[k]));
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    return c.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

async function loadData() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    try {
        const response = await fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/index`);
        const index = await response.json();
        const promises = index.topics.map(t => fetch(`https://backend-todopau.onrender.com/api/${subjectConfig[currentSubject].folder}/file?name=${t.file}`).then(r => r.json()));
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        loader.classList.add('hidden');
        render();
    } catch (e) { loader.classList.add('hidden'); }
}

function render() {
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const model = document.getElementById('modelSelect').value;
    const term = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('questions');

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year) && (model==='all'||q.exam_model===model) &&
        (activeTagFilter==='all'||q.detected_topics?.includes(activeTagFilter))
    );

    document.getElementById('stats').textContent = `${filtered.length} RESULTADOS`;
    container.innerHTML = '';
    
    filtered.forEach(q => {
        const isSel = selectedIds.has(q.id);
        const hasSol = q.solution && q.solution.trim().length > 5;
        const card = document.createElement('div');
        card.className = `data-row ${isSel ? 'ring-2 ring-black dark:ring-white' : ''}`;
        card.innerHTML = `
            <div class="card-header-area">
                <h2 class="text-2xl font-black">${q.exam_year}</h2>
                <span class="text-[9px] font-bold text-gray-400 uppercase">${q.exam_model || ''}</span>
            </div>
            <div class="card-content-area prose prose-sm dark:prose-invert">
                ${marked.parse(cleanText(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="problem-image">` : ''}
            </div>
            <div class="card-tags-area">
                <span class="px-3 py-1 bg-blue-500 text-white rounded-lg text-[8px] font-black uppercase">${q.topic_name}</span>
                ${(q.detected_topics || []).map(t => `<span class="px-3 py-1 bg-emerald-500 text-white rounded-lg text-[8px] font-black uppercase">${t}</span>`).join('')}
            </div>
            <div class="card-footer-area flex gap-2 border-t pt-4 dark:border-zinc-800">
                <button onclick="toggleInExam('${q.id}')" class="btn-app ${isSel ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-zinc-800'}">
                    ${isSel ? 'QUITAR' : 'SELECCIONAR'}
                </button>
                <button onclick="toggleSol('${q.id}')" class="btn-app ${hasSol ? 'btn-sol-active' : 'bg-gray-100 dark:bg-zinc-800 opacity-40'}">
                    ${hasSol ? 'SOLUCIÓN' : 'SIN SOLUCIÓN'}
                </button>
            </div>
            <div id="sol-${q.id}" class="solucion-panel hidden mt-4 p-4 bg-gray-50 dark:bg-zinc-900 rounded-xl">
                ${marked.parse(cleanText(q.solution || ""))}
            </div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

function handleYearChange() {
    const year = document.getElementById('yearSelect').value;
    const mSel = document.getElementById('modelSelect');
    if (year === 'all') {
        mSel.innerHTML = '<option value="all">Modelo: Elige año primero</option>';
        mSel.disabled = true;
    } else {
        const availableModels = [...new Set(allQuestions.filter(q => q.exam_year == year).map(q => q.exam_model))].sort();
        mSel.innerHTML = '<option value="all">Modelo: Todos</option>';
        availableModels.forEach(m => { mSel.innerHTML += `<option value="${m}">${m}</option>`; });
        mSel.disabled = false;
    }
    updateDynamicTags();
    render();
}

function toggleSol(id) {
    if(!window.isUserLogged) return alert("Inicia sesión primero");
    document.getElementById(`sol-${id}`).classList.toggle('hidden');
}

function toggleInExam(id) {
    selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
    document.getElementById('examCount').textContent = selectedIds.size;
    render();
}

function switchSubject(id) {
    currentSubject = id;
    document.documentElement.style.setProperty('--subject-color', subjectConfig[id].color);
    document.querySelectorAll('.subject-tab').forEach(b => b.classList.remove('active-sub'));
    document.getElementById(`btn-${id}`).classList.add('active-sub');
    loadData();
}

function populateSelectors() {
    const tSel = document.getElementById('topicSelect'), ySel = document.getElementById('yearSelect');
    const topics = [...new Set(allQuestions.map(q => q.topic_name))].sort();
    const years = [...new Set(allQuestions.map(q => q.exam_year))].sort((a,b)=>b-a);
    const fill = (el, items, lbl) => {
        el.innerHTML = `<option value="all">${lbl}</option>`;
        items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
    };
    fill(tSel, topics, "Temas..."); fill(ySel, years, "Años...");
    const sortedYears = [...years].sort();
    fill(document.getElementById('autoYearFrom'), sortedYears, "Desde...");
    fill(document.getElementById('autoYearTo'), years, "Hasta...");
    fill(document.getElementById('autoYearFrom-mob'), sortedYears, "Desde...");
    fill(document.getElementById('autoYearTo-mob'), years, "Hasta...");
}

function runSorteo(mode) {
    const from = parseInt(document.getElementById(mode === 'pc' ? 'autoYearFrom' : 'autoYearFrom-mob').value);
    const to = parseInt(document.getElementById(mode === 'pc' ? 'autoYearTo' : 'autoYearTo-mob').value);
    const pool = allQuestions.filter(q => (isNaN(from) || q.exam_year >= from) && (isNaN(to) || q.exam_year <= to));
    if(pool.length === 0) return alert("Sin resultados");
    selectedIds.clear();
    const shuffled = pool.sort(() => 0.5 - Math.random());
    shuffled.slice(0, 1).forEach(q => selectedIds.add(q.id));
    document.getElementById('examCount').textContent = selectedIds.size;
    render();
}

function printExam() {
    if(!window.isUserLogged) return alert("Inicia sesión");
    window.print();
}

function updateDynamicTags() {
    const topic = document.getElementById('topicSelect').value, year = document.getElementById('yearSelect').value;
    const section = document.getElementById('tagCloudSection');
    if (topic === 'all' && year === 'all') return section.classList.add('hidden');
    section.classList.remove('hidden');
    const visibleQs = allQuestions.filter(q => (topic==='all'||q.topic_name===topic) && (year==='all'||q.exam_year==year));
    const counts = {};
    visibleQs.forEach(q => q.detected_topics?.forEach(t => counts[t] = (counts[t] || 0) + 1));
    const cloud = document.getElementById('tagCloud'); cloud.innerHTML = "";
    Object.keys(counts).forEach(t => {
        const span = document.createElement('span');
        span.className = `px-3 py-1 bg-gray-100 dark:bg-zinc-800 text-[9px] font-bold rounded-lg cursor-pointer ${activeTagFilter === t ? 'bg-black text-white' : ''}`;
        span.textContent = t;
        span.onclick = () => { activeTagFilter = (activeTagFilter === t) ? "all" : t; render(); };
        cloud.appendChild(span);
    });
}

function resetFilters() {
    document.getElementById('search').value = ""; document.getElementById('topicSelect').value = "all";
    document.getElementById('yearSelect').value = "all"; handleYearChange();
    activeTagFilter = "all"; render();
}

async function updateUserLevel() {
    const email = document.getElementById('adminUserEmail').value;
    const plan = document.getElementById('adminUserPlan').value;
    const status = document.getElementById('adminStatus');
    const token = await auth.currentUser.getIdToken();
    status.textContent = "Procesando...";
    status.className = "text-[10px] text-center font-bold uppercase text-blue-500";
    try {
        const response = await fetch('https://backend-todopau.onrender.com/api/admin/set-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ email, plan })
        });
        if (response.ok) {
            status.textContent = "¡Nivel actualizado con éxito!";
            status.className = "text-[10px] text-center font-bold uppercase text-green-500";
        } else { throw new Error("Error en el servidor"); }
    } catch (error) {
        status.textContent = "Error al actualizar";
        status.className = "text-[10px] text-center font-bold uppercase text-red-500";
    }
}

document.addEventListener('DOMContentLoaded', () => { 
    document.getElementById('search').oninput = render; 
    if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    switchSubject('QUIM'); 
});
</script>

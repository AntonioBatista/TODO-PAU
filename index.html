<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v7.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#121212', darkCard: '#1e1e1e', darkBorder: '#333333' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        :root { --subject-color: #000000; }
        body { @apply bg-gray-50 dark:bg-darkBg font-sans transition-colors duration-300 overflow-x-hidden h-screen flex flex-col; }
        
        .glass-header { @apply sticky top-0 z-50 flex items-center justify-between h-[70px] px-4 border-b bg-white dark:bg-darkBg dark:border-zinc-800 flex-shrink-0; }
        .subject-nav { @apply flex flex-1 items-center gap-2 mx-4 overflow-x-auto no-scrollbar; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .subject-tab { @apply flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold text-gray-500 cursor-pointer transition-all; }
        .subject-tab.active-sub { @apply bg-white dark:bg-zinc-800 shadow-sm border dark:border-zinc-700; color: var(--subject-color); }

        /* Sidebars */
        #sidebar { @apply fixed lg:relative top-[70px] lg:top-0 h-[calc(100vh-70px)] lg:h-auto w-[280px] bg-white dark:bg-darkBg border-r dark:border-zinc-800 z-40 transition-transform duration-300 flex-shrink-0; }
        #sidebar.collapsed { transform: translateX(-100%); }

        #rightPanel { @apply hidden lg:flex flex-col w-[320px] bg-white dark:bg-darkBg border-l dark:border-zinc-800 p-6 overflow-y-auto transition-all duration-300 flex-shrink-0; }
        #rightPanel.collapsed { @apply w-0 p-0 overflow-hidden border-none; }

        /* Tarjetas Dinámicas */
        .data-row { @apply bg-white dark:bg-darkCard border dark:border-zinc-800 rounded-3xl p-6 shadow-sm mb-4; display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 768px) { 
            .data-row { grid-template-columns: 1fr 200px; grid-template-areas: "header tags" "content tags" "footer footer" "solution solution"; gap: 0 1.5rem; } 
        }
        .card-header-area { grid-area: header; }
        .card-content-area { grid-area: content; }
        .card-tags-area { grid-area: tags; @apply flex flex-wrap md:flex-col md:items-end gap-2; }
        .card-footer-area { grid-area: footer; }

        .btn-app { @apply px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider active:scale-95 transition-all; }
        .btn-sol-active { background: var(--subject-color) !important; color: white !important; }

        .problem-image { @apply w-full rounded-2xl border dark:border-zinc-800 my-4 bg-white; }
        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }
    </style>
</head>

<body>

<div id="menuOverlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 hidden lg:hidden"></div>

<header class="glass-header no-print">
    <div class="flex items-center gap-2">
        <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-black italic text-lg hidden sm:block">TodoPAU</span>
    </div>

    <nav class="subject-nav">
        <div onclick="switchSubject('QUIM')" id="btn-QUIM" class="subject-tab active-sub">QUÍMICA</div>
        <div onclick="switchSubject('FIS')" id="btn-FIS" class="subject-tab">FÍSICA</div>
        <div onclick="switchSubject('MATII')" id="btn-MATII" class="subject-tab">MAT II</div>
        <div onclick="switchSubject('MACSII')" id="btn-MACSII" class="subject-tab">CCSS</div>
        <div onclick="switchSubject('TINII')" id="btn-TINII" class="subject-tab">TECNO</div>
        <div onclick="switchSubject('DTECII')" id="btn-DTECII" class="subject-tab">DIBUJO</div>
    </nav>

    <div class="flex items-center gap-2">
        <button onclick="toggleDarkMode()" class="p-2 rounded-xl">🌙</button>
        <button id="loginBtn" class="bg-black text-white dark:bg-white dark:text-black px-4 py-2 rounded-xl text-[10px] font-bold">ENTRAR</button>
        <button onclick="toggleRightPanel()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg hidden lg:block">
            <svg id="panelArrow" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden relative">
    <aside id="sidebar" class="p-6 flex flex-col gap-6 collapsed no-print overflow-y-auto">
        <section>
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Buscador</label>
            <input id="search" type="text" placeholder="Concepto..." class="w-full bg-gray-50 dark:bg-zinc-900 p-3 text-sm rounded-xl border dark:border-zinc-800 outline-none">
        </section>

        <details id="mobileGen" class="lg:hidden bg-blue-50/50 dark:bg-blue-900/20 p-4 rounded-2xl border border-blue-100 dark:border-blue-800">
            <summary class="text-[10px] font-black text-blue-800 dark:text-blue-300 uppercase cursor-pointer">Generador de Examen</summary>
            <div class="pt-4 space-y-3">
                <input id="h-inst-mob" type="text" placeholder="Institución" class="w-full p-2 text-[10px] rounded border dark:bg-zinc-900">
                <div class="grid grid-cols-2 gap-2">
                    <select id="autoYearFrom-mob" class="border rounded p-2 text-[10px] dark:bg-zinc-900"></select>
                    <select id="autoYearTo-mob" class="border rounded p-2 text-[10px] dark:bg-zinc-900"></select>
                </div>
                <button onclick="runSorteo('mob')" class="w-full py-2 bg-blue-600 text-white rounded-xl font-black text-[9px]">SORTEAR</button>
                <button onclick="printExam()" class="w-full py-2 bg-black text-white dark:bg-white dark:text-black rounded-xl font-black text-[9px]">PDF</button>
            </div>
        </details>

        <button id="adminBtnMob" onclick="toggleAdminPanel()" class="hidden w-full py-3 border-2 border-dashed border-red-200 text-red-400 rounded-2xl font-black text-[9px] uppercase">Administración</button>

        <section class="space-y-4">
            <select id="topicSelect" onchange="updateDynamicTags(); render();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none"></select>
            <select id="yearSelect" onchange="handleYearChange();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none"></select>
            <select id="modelSelect" onchange="render();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none" disabled>
                <option value="all">Modelo: Elige año</option>
            </select>
        </section>

        <div id="tagCloudSection" class="hidden">
            <label class="text-[10px] font-black text-gray-400 uppercase mb-3 block border-t dark:border-zinc-800 pt-3 text-center">Etiquetas</label>
            <div id="tagCloud" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
        
        <button onclick="resetFilters()" class="w-full py-2 text-red-500 text-[9px] font-black uppercase">Limpiar Filtros</button>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-10 relative bg-[#fcfcfc] dark:bg-darkBg custom-scroll flex flex-col items-center">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-10 transition-opacity">
            <img id="placeholder-icon" src="https://img.icons8.com/fluency/240/test-tube.png" class="w-48 md:w-64 mb-4">
            <p class="text-xl font-black uppercase tracking-[0.3em]">TodoPAU</p>
        </div>

        <div id="questions" class="w-full max-w-4xl flex flex-col gap-6 relative z-10"></div>
        <div id="loader" class="hidden text-center py-20 italic opacity-40">Cargando datos...</div>
    </main>

    <aside id="rightPanel" class="collapsed no-print">
        <h3 class="font-black text-xs uppercase tracking-widest mb-6 text-center">Configurador de Examen</h3>
        <div class="space-y-6">
            <div class="space-y-2">
                <input id="h-inst" type="text" placeholder="Institución" class="w-full p-3 rounded-xl border dark:bg-zinc-900 text-xs outline-none">
                <input id="h-title" type="text" placeholder="Título Examen" class="w-full p-3 rounded-xl border dark:bg-zinc-900 text-xs outline-none">
            </div>
            <div class="bg-blue-50 dark:bg-blue-900/10 p-5 rounded-3xl border border-blue-100">
                <p class="text-[9px] font-black text-blue-600 uppercase mb-4 text-center">Sorteo Aleatorio</p>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select id="autoYearFrom" class="p-2 text-[10px] rounded-lg border dark:bg-zinc-800"></select>
                    <select id="autoYearTo" class="p-2 text-[10px] rounded-lg border dark:bg-zinc-800"></select>
                </div>
                <button onclick="runSorteo('pc')" class="w-full py-2 bg-blue-600 text-white rounded-lg font-black text-[9px]">SORTEAR</button>
            </div>
            <div class="bg-gray-100 dark:bg-zinc-800 p-4 rounded-2xl text-center">
                <p class="text-[9px] font-bold uppercase">Seleccionados: <span id="examCount" class="text-blue-600 text-lg">0</span></p>
            </div>
            <button onclick="printExam()" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black rounded-2xl font-black text-[10px] tracking-widest shadow-xl uppercase">Generar PDF</button>
            
            <button id="adminBtnPC" onclick="toggleAdminPanel()" class="hidden w-full py-3 border-2 border-dashed border-red-200 text-red-400 rounded-2xl font-black text-[9px] uppercase">Panel Admin</button>
        </div>
    </aside>
</div>

<div id="adminPanel" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white dark:bg-darkCard w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl flex flex-col max-h-[80vh]">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase italic">Solicitudes Pendientes</h2>
            <button onclick="toggleAdminPanel()" class="text-2xl">✕</button>
        </div>
        <div id="requestList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scroll"></div>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
const MY_ADMIN_EMAIL = "tu_correo@gmail.com"; // CAMBIA ESTO

const firebaseConfig = {
    apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
    authDomain: "todopau-bat.firebaseapp.com",
    projectId: "todopau-bat",
    appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentSubject = "QUIM";
let allQuestions = [];
let selectedIds = new Set();
let activeTagFilter = "all";

// --- AUTH ---
auth.onAuthStateChanged(async user => {
    const btn = document.getElementById("loginBtn");
    window.isUserLogged = !!user;
    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline mr-1"> SALIR`;
        btn.onclick = () => auth.signOut().then(() => location.reload());
        
        const tokenResult = await user.getIdTokenResult();
        const plan = tokenResult.claims.plan || 'basico';
        window.currentUserPlan = plan;

        if (user.email === MY_ADMIN_EMAIL) {
            document.getElementById('adminBtnMob').classList.remove('hidden');
            document.getElementById('adminBtnPC').classList.remove('hidden');
        }
        if (plan === 'docente') toggleRightPanel(true);
    } else {
        btn.textContent = "ENTRAR";
        btn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        window.currentUserPlan = 'basico';
    }
    loadData();
});

// --- MOTOR DE LIMPIEZA TEXTO (Fórmulas Químicas e Isótopos) ---
function cleanText(t) {
    if (!t) return "";
    let clean = t.replace(/\\n/g, '\n');
    const encodingMap = {'3³': 'ó', '3a': 'ía', '3º': 'ú', '3i': 'í', '3e': 'é', '3n': 'ón', '3u': 'ú', '3A': 'Á', '3O': 'Ó'};
    Object.keys(encodingMap).forEach(key => clean = clean.replace(new RegExp(key, 'g'), encodingMap[key]));
    
    // Iones y Superíndices
    const chg = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','+':'⁺','-':'⁻'};
    clean = clean.replace(/([A-Z][a-z]?|[\)])(\d*)([\+\-])(?=\s|$|\.|\,)/g, (m, e, n, s) => e + n.split('').map(x=>chg[x]).join('') + chg[s]);
    
    // Subíndices químicos (ej: H2O -> H₂O)
    const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
    return clean.replace(/\b([A-Z][a-z]?)(\d+)\b/g, (m, el, n) => el + n.split('').map(x=>subs[x]).join(''));
}

// --- CORE FUNCTIONS ---
async function loadData() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    try {
        let headers = {};
        if (auth.currentUser) {
            const token = await auth.currentUser.getIdToken();
            headers = { 'Authorization': `Bearer ${token}` };
        }
        const subjects = { QUIM:'quimica', FIS:'fisica', MATII:'matii', MACSII:'macsii', TINII:'tinii', DTECII:'dtecii' };
        const res = await fetch(`https://backend-todopau.onrender.com/api/${subjects[currentSubject]}/index`, { headers });
        const idx = await res.json();
        const promises = idx.topics.map(t => fetch(`https://backend-todopau.onrender.com/api/${subjects[currentSubject]}/file?name=${t.file}`, { headers }).then(r => r.json()));
        allQuestions = (await Promise.all(promises)).flat();
        populateSelectors();
        loader.classList.add('hidden');
        render();
    } catch (e) { loader.classList.add('hidden'); }
}

function render() {
    const container = document.getElementById('questions');
    const empty = document.getElementById('emptyState');
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const term = document.getElementById('search').value.toLowerCase();

    if (year === 'all' && topic === 'all' && term === "") {
        container.innerHTML = "";
        empty.style.opacity = "0.1";
        return;
    }

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && 
        (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year)
    );

    empty.style.opacity = "0";
    container.innerHTML = "";
    filtered.forEach(q => {
        const isSel = selectedIds.has(q.id);
        const hasSol = q.solution && q.solution.length > 5;
        const card = document.createElement('div');
        card.className = "data-row";
        card.innerHTML = `
            <div class="card-header-area">
                <h2 class="text-2xl font-black">${q.exam_year} <span class="text-[9px] text-gray-400 font-bold ml-2 uppercase">${q.exam_model || ''}</span></h2>
            </div>
            <div class="card-content-area prose prose-sm dark:prose-invert">
                ${marked.parse(cleanText(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="problem-image">` : ''}
            </div>
            <div class="card-tags-area">
                <span class="px-3 py-1 bg-blue-500 text-white rounded-lg text-[8px] font-black uppercase">${q.topic_name}</span>
                ${(q.detected_topics || []).map(t => `<span class="px-2 py-0.5 bg-emerald-500 text-white rounded text-[8px] font-black uppercase">${t}</span>`).join('')}
            </div>
            <div class="card-footer-area flex gap-2 border-t dark:border-zinc-800 pt-4">
                <button onclick="toggleInExam('${q.id}')" class="btn-app ${isSel ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-zinc-800'}">${isSel ? '✕ Quitar' : '+ Añadir'}</button>
                <button onclick="document.getElementById('sol-${q.id}').classList.toggle('hidden')" class="btn-app ${hasSol ? 'btn-sol-active' : 'opacity-30'}">Solución</button>
            </div>
            <div id="sol-${q.id}" class="solucion-panel hidden mt-4 p-5 bg-gray-50 dark:bg-zinc-900 rounded-2xl">
                ${marked.parse(cleanText(q.solution || ""))}
            </div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

// --- ADMIN & UI HELPERS ---
function switchSubject(id) {
    currentSubject = id;
    const icons = { QUIM:'test-tube', FIS:'physics', MATII:'math', MACSII:'line-chart', TINII:'circuit', DTECII:'drafting-compass' };
    document.getElementById('placeholder-icon').src = `https://img.icons8.com/fluency/240/${icons[id]}.png`;
    document.querySelectorAll('.subject-tab').forEach(t => t.classList.toggle('active-sub', t.id === `btn-${id}`));
    loadData();
}

function handleYearChange() {
    const year = document.getElementById('yearSelect').value;
    const mSel = document.getElementById('modelSelect');
    if (year === 'all') { mSel.disabled = true; } 
    else {
        const models = [...new Set(allQuestions.filter(q => q.exam_year == year).map(q => q.exam_model))].sort();
        mSel.innerHTML = '<option value="all">Modelo: Todos</option>';
        models.forEach(m => mSel.innerHTML += `<option value="${m}">${m}</option>`);
        mSel.disabled = false;
    }
    render();
}

function toggleAdminPanel() {
    const panel = document.getElementById('adminPanel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) {
        const list = document.getElementById('requestList');
        list.innerHTML = "Cargando solicitudes...";
        db.collection("requests").get().then(snap => {
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = "p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl flex justify-between items-center";
                div.innerHTML = `<div><p class="text-[10px] font-bold">${d.email}</p><p class="text-[8px] uppercase text-blue-500">${d.plan}</p></div>
                                 <button onclick="approveUser('${d.email}','${d.plan}','${doc.id}')" class="bg-black text-white px-4 py-2 rounded-xl text-[9px] font-black">APROBAR</button>`;
                list.appendChild(div);
            });
        });
    }
}

async function approveUser(email, plan, docId) {
    const token = await auth.currentUser.getIdToken();
    fetch('https://backend-todopau.onrender.com/api/admin/set-plan', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email, plan })
    }).then(res => { if(res.ok) { db.collection("requests").doc(docId).delete(); toggleAdminPanel(); toggleAdminPanel(); } });
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function toggleRightPanel(force = false) { 
    const p = document.getElementById('rightPanel');
    if (force) p.classList.remove('collapsed'); else p.classList.toggle('collapsed');
}
function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

document.addEventListener('DOMContentLoaded', () => { 
    document.getElementById('search').oninput = render; 
    switchSubject('QUIM'); 
});
</script>
</body>
</html>

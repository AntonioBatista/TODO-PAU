<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEvAU-DB | TodoPAU v6.8</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#121212', darkCard: '#1e1e1e', darkBorder: '#333333' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:italic,wght@400;600&display=swap');
        :root { --subject-color: #000000; }
        body { @apply bg-gray-50 dark:bg-darkBg font-sans transition-colors duration-300 overflow-x-hidden; }
        
        .glass-header { @apply sticky top-0 z-50 flex items-center justify-between h-[70px] px-4 border-b bg-white/80 dark:bg-darkBg/80 backdrop-blur-md dark:border-zinc-800; }
        .subject-nav { @apply flex flex-1 items-center gap-2 mx-4 overflow-x-auto no-scrollbar; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .subject-tab { @apply flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold text-gray-500 cursor-pointer transition-all; }
        .subject-tab.active-sub { @apply bg-white dark:bg-zinc-800 shadow-sm border dark:border-zinc-700; color: var(--subject-color); }

        #sidebar { @apply fixed lg:relative top-[70px] lg:top-0 h-[calc(100vh-70px)] lg:h-auto w-[280px] bg-white dark:bg-darkBg border-r dark:border-zinc-800 z-40 transition-transform duration-300; }
        #sidebar.collapsed { transform: translateX(-100%); }

        #rightPanel { @apply hidden lg:flex flex-col w-[320px] bg-white dark:bg-darkBg border-l dark:border-zinc-800 p-6 overflow-y-auto transition-all duration-300; }
        #rightPanel.collapsed { @apply w-0 p-0 overflow-hidden border-none; }

        .data-row { @apply bg-white dark:bg-darkCard border dark:border-zinc-800 rounded-3xl p-6 shadow-sm mb-4; display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 768px) { .data-row { grid-template-columns: 1fr 220px; grid-template-areas: "header tags" "content tags" "footer footer" "solution solution"; } }
        
        .btn-app { @apply px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider active:scale-95 transition-all; }
        .btn-sol-active { background: var(--subject-color) !important; color: white !important; }

        .problem-image { @apply w-full rounded-2xl border dark:border-zinc-800 my-4 bg-white; }
        sub { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; bottom: -0.25em; }
    </style>
</head>

<body>

<div id="menuOverlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 hidden lg:hidden"></div>

<header class="glass-header no-print">
    <div class="flex items-center gap-2">
        <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span class="font-black italic text-lg hidden sm:block">TodoPAU</span>
    </div>

    <nav class="subject-nav">
        <div onclick="switchSubject('QUIM')" id="btn-QUIM" class="subject-tab active-sub">QUÍMICA</div>
        <div onclick="switchSubject('FIS')" id="btn-FIS" class="subject-tab">FÍSICA</div>
        <div onclick="switchSubject('MATII')" id="btn-MATII" class="subject-tab">MAT II</div>
        <div onclick="switchSubject('MACSII')" id="btn-MACSII" class="subject-tab">CCSS</div>
        <div onclick="switchSubject('TINII')" id="btn-TINII" class="subject-tab">TECNO</div>
        <div onclick="switchSubject('DTECII')" id="btn-DTECII" class="subject-tab">DIBUJO</div>
    </nav>

    <div class="flex items-center gap-2">
        <button onclick="toggleDarkMode()" class="p-2 rounded-xl">🌙</button>
        <div id="userArea" class="flex items-center gap-2">
            <button id="loginBtn" class="bg-black text-white dark:bg-white dark:text-black px-4 py-2 rounded-xl text-[10px] font-bold">ENTRAR</button>
        </div>
        <button id="panelToggleBtn" onclick="toggleRightPanel()" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg hidden lg:block">
            <svg id="panelArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>
</header>

<div class="flex h-[calc(100vh-70px)] overflow-hidden">
    <aside id="sidebar" class="p-6 flex flex-col gap-6 collapsed no-print overflow-y-auto">
        <section>
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Buscador</label>
            <input id="search" type="text" placeholder="Concepto..." class="w-full bg-gray-50 dark:bg-zinc-900 p-3 text-sm rounded-xl border dark:border-zinc-800 outline-none">
        </section>

        <div id="requestPlanBox" class="hidden bg-gradient-to-br from-blue-500 to-indigo-600 p-4 rounded-2xl text-white shadow-lg">
            <p class="text-[9px] font-black uppercase mb-2">Mejorar Cuenta</p>
            <select id="requestedPlan" class="w-full bg-white/20 border-none rounded-lg p-2 text-xs mb-2 outline-none">
                <option value="estudiante">Plan Estudiante</option>
                <option value="pro">Plan Estudiante PRO</option>
                <option value="docente">Plan Docente</option>
            </select>
            <button onclick="sendPlanRequest()" class="w-full py-2 bg-white text-blue-600 rounded-lg font-black text-[9px]">SOLICITAR ACCESO</button>
        </div>

        <section class="space-y-4">
            <select id="topicSelect" onchange="updateDynamicTags(); render();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none"></select>
            <select id="yearSelect" onchange="handleYearChange();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none"></select>
            <select id="modelSelect" onchange="render();" class="w-full bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl text-xs outline-none" disabled>
                <option value="all">Modelo: Elige año</option>
            </select>
        </section>

        <div id="tagCloudSection" class="hidden">
            <label class="text-[10px] font-black text-gray-400 uppercase mb-3 block border-t dark:border-zinc-800 pt-3">Etiquetas</label>
            <div id="tagCloud" class="flex flex-wrap gap-2"></div>
        </div>

        <button id="adminBtnMob" onclick="toggleAdminPanel()" class="hidden w-full py-3 border-2 border-dashed border-red-200 text-red-400 rounded-2xl font-black text-[9px] uppercase">Administración</button>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-10 relative bg-[#fcfcfc] dark:bg-darkBg custom-scroll">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-10 transition-opacity">
            <img id="placeholder-icon" src="https://img.icons8.com/fluency/240/test-tube.png" class="w-48 md:w-64 mb-4">
            <p class="text-xl font-black uppercase tracking-[0.3em]">TodoPAU</p>
        </div>

        <div id="questions" class="max-w-4xl mx-auto flex flex-col gap-6 relative z-10"></div>
        <div id="loader" class="hidden text-center py-20 italic opacity-40">Cargando base de datos...</div>
    </main>

    <aside id="rightPanel" class="collapsed no-print">
        <h3 class="font-black text-xs uppercase tracking-widest mb-6">Configurador PDF</h3>
        <div class="space-y-6">
            <div class="space-y-2">
                <input id="h-inst" type="text" placeholder="Centro Educativo" class="w-full p-3 rounded-xl border dark:bg-zinc-900 dark:border-zinc-800 text-xs outline-none">
                <input id="h-title" type="text" placeholder="Título del Examen" class="w-full p-3 rounded-xl border dark:bg-zinc-900 dark:border-zinc-800 text-xs outline-none">
            </div>
            <div class="bg-blue-50 dark:bg-blue-900/10 p-4 rounded-2xl border border-blue-100 dark:border-blue-900/20">
                <p class="text-[9px] font-black text-blue-600 uppercase mb-3 text-center">Sorteo Aleatorio</p>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select id="autoYearFrom" class="p-2 text-[10px] rounded-lg border dark:bg-zinc-800"></select>
                    <select id="autoYearTo" class="p-2 text-[10px] rounded-lg border dark:bg-zinc-800"></select>
                </div>
                <button onclick="runSorteo()" class="w-full py-2 bg-blue-600 text-white rounded-lg font-black text-[9px]">SORTEAR</button>
            </div>
            <button onclick="printExam()" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black rounded-2xl font-black text-[10px] tracking-widest shadow-xl uppercase">Generar PDF</button>
            <button id="adminBtnPC" onclick="toggleAdminPanel()" class="hidden w-full py-3 border-2 border-dashed border-red-200 text-red-400 rounded-2xl font-black text-[9px] uppercase">Panel Admin</button>
        </div>
    </aside>
</div>

<div id="adminPanel" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white dark:bg-darkCard w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase italic">Solicitudes Pendientes</h2>
            <button onclick="toggleAdminPanel()" class="p-2">✕</button>
        </div>
        
        <div id="requestList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scroll">
            <p class="text-xs text-gray-400 text-center italic">Cargando solicitudes...</p>
        </div>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
const MY_ADMIN_EMAIL = "TU_CORREO_AQUÍ@gmail.com"; // CAMBIA ESTO

const firebaseConfig = {
    apiKey: "AIzaSyDGfPqbfdJwWn_i7NPp4YbyQjYz2EPvoFk",
    authDomain: "todopau-bat.firebaseapp.com",
    projectId: "todopau-bat",
    appId: "1:329604600256:web:d0b43bc40bb2c821c67825"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- AUTH & PERMISOS ---
auth.onAuthStateChanged(async user => {
    const loginBtn = document.getElementById("loginBtn");
    const requestBox = document.getElementById("requestPlanBox");
    
    if (user) {
        loginBtn.innerHTML = `<img src="${user.photoURL}" class="w-4 h-4 rounded-full inline mr-2"> SALIR`;
        loginBtn.onclick = () => auth.signOut().then(() => location.reload());
        requestBox.classList.remove('hidden');

        const tokenResult = await user.getIdTokenResult();
        const plan = tokenResult.claims.plan || 'basico';
        window.currentUserPlan = plan;

        // Mostrar botones admin solo si eres tú
        if (user.email === MY_ADMIN_EMAIL) {
            document.getElementById('adminBtnMob').classList.remove('hidden');
            document.getElementById('adminBtnPC').classList.remove('hidden');
        }
        
        // Mostrar panel docente solo si el plan lo permite
        if (plan === 'docente') { toggleRightPanel(true); }

    } else {
        loginBtn.textContent = "ENTRAR";
        loginBtn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        requestBox.classList.add('hidden');
        window.currentUserPlan = 'basico';
    }
});

// --- LÓGICA DE SOLICITUDES ---
function sendPlanRequest() {
    const user = auth.currentUser;
    const plan = document.getElementById('requestedPlan').value;
    if (!user) return alert("Inicia sesión primero");

    db.collection("requests").doc(user.uid).set({
        email: user.email,
        plan: plan,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => alert("Solicitud enviada al profesor."));
}

function loadRequests() {
    const list = document.getElementById('requestList');
    list.innerHTML = "";
    db.collection("requests").orderBy("timestamp", "desc").get().then(snap => {
        if (snap.empty) list.innerHTML = "<p class='text-center py-10 opacity-30'>No hay solicitudes</p>";
        snap.forEach(doc => {
            const req = doc.data();
            const div = document.createElement('div');
            div.className = "p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl flex justify-between items-center";
            div.innerHTML = `
                <div>
                    <p class="text-[11px] font-bold">${req.email}</p>
                    <p class="text-[9px] text-blue-500 font-black uppercase">${req.plan}</p>
                </div>
                <button onclick="approveUser('${req.email}', '${req.plan}', '${doc.id}')" class="bg-black text-white px-4 py-2 rounded-xl text-[9px] font-black">APROBAR</button>
            `;
            list.appendChild(div);
        });
    });
}

async function approveUser(email, plan, docId) {
    const token = await auth.currentUser.getIdToken();
    fetch('https://backend-todopau.onrender.com/api/admin/set-plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email, plan })
    }).then(res => {
        if (res.ok) {
            db.collection("requests").doc(docId).delete();
            alert("Usuario actualizado");
            loadRequests();
        }
    });
}

// --- LÓGICA UI ---
function switchSubject(id) {
    const subjects = {
        'QUIM': { icon: 'test-tube', color: '#00c853' },
        'FIS': { icon: 'physics', color: '#2979ff' },
        'MATII': { icon: 'math', color: '#651fff' },
        'MACSII': { icon: 'line-chart', color: '#f50057' },
        'TINII': { icon: 'circuit', color: '#ff9100' },
        'DTECII': { icon: 'drafting-compass', color: '#455a64' }
    };
    
    currentSubject = id;
    document.documentElement.style.setProperty('--subject-color', subjects[id].color);
    document.getElementById('placeholder-icon').src = `https://img.icons8.com/fluency/240/${subjects[id].icon}.png`;
    
    document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active-sub'));
    document.getElementById(`btn-${id}`).classList.add('active-sub');
    
    // Al cambiar materia, limpiamos problemas hasta que el usuario busque
    document.getElementById('questions').innerHTML = "";
    document.getElementById('emptyState').style.opacity = "0.1";
    
    loadData();
}

function render() {
    const container = document.getElementById('questions');
    const emptyState = document.getElementById('emptyState');
    
    const year = document.getElementById('yearSelect').value;
    const topic = document.getElementById('topicSelect').value;
    const model = document.getElementById('modelSelect').value;
    const term = document.getElementById('search').value.toLowerCase();

    // SI NO HAY FILTROS ACTIVOS, NO RENDERIZAR NADA
    if (year === 'all' && topic === 'all' && term === "") {
        container.innerHTML = "";
        emptyState.style.opacity = "0.1";
        return;
    }

    const filtered = allQuestions.filter(q => 
        (q.text||"").toLowerCase().includes(term) && 
        (topic==='all'||q.topic_name===topic) && 
        (year==='all'||q.exam_year==year) && 
        (model==='all'||q.exam_model===model)
    );

    emptyState.style.opacity = "0";
    container.innerHTML = "";
    
    filtered.forEach(q => {
        const hasSol = q.solution && q.solution.length > 10;
        const card = document.createElement('div');
        card.className = "data-row";
        card.innerHTML = `
            <div class="card-header-area">
                <span class="text-2xl font-black">${q.exam_year}</span>
                <span class="text-[10px] text-gray-400 font-bold uppercase ml-2">${q.exam_model || ''}</span>
            </div>
            <div class="card-content-area prose prose-sm dark:prose-invert">
                ${marked.parse(cleanText(q.text))}
                ${q.has_image ? `<img src="${q.image_data}" class="problem-image">` : ''}
            </div>
            <div class="card-tags-area">
                <span class="px-3 py-1 bg-blue-500 text-white rounded-lg text-[8px] font-black uppercase">${q.topic_name}</span>
            </div>
            <div class="card-footer-area flex gap-2 border-t dark:border-zinc-800 pt-4">
                <button onclick="toggleInExam('${q.id}')" class="btn-app bg-gray-100 dark:bg-zinc-800">AÑADIR</button>
                <button onclick="toggleSol('${q.id}')" class="btn-app ${hasSol ? 'btn-sol-active' : 'opacity-30'}">SOLUCIÓN</button>
            </div>
            <div id="sol-${q.id}" class="solucion-panel hidden mt-4 p-5 bg-gray-50 dark:bg-zinc-900 rounded-2xl">
                ${marked.parse(cleanText(q.solution || ""))}
            </div>`;
        container.appendChild(card);
    });
    renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
}

// --- ADMIN UI ---
function toggleAdminPanel() {
    if (auth.currentUser?.email !== MY_ADMIN_EMAIL) return;
    const panel = document.getElementById('adminPanel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) loadRequests();
}

function toggleRightPanel(forceOpen = false) {
    const panel = document.getElementById('rightPanel');
    if (forceOpen) panel.classList.remove('collapsed');
    else panel.classList.toggle('collapsed');
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('collapsed'); }

// ... (Resto de funciones: cleanText, loadData, populateSelectors, etc., igual que v6.7)
</script>
</body>
</html>
